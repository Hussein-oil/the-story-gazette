<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTS diagnostic</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;max-width:560px;margin:40px auto;padding:0 16px;line-height:1.5}
  button{font-size:18px;padding:12px 20px;margin:6px 6px 6px 0;border-radius:10px;border:1px solid #888;cursor:pointer}
  #log{margin-top:18px;padding:12px;background:#f4f4f4;border-radius:10px;white-space:pre-wrap;font:14px/1.5 monospace;min-height:80px}
  .ok{color:#137333}.err{color:#c5221f}
</style>
</head>
<body>
<h1>TTS diagnostic</h1>
<p>Click a button. You should hear a short sentence. Status appears below.</p>
<button id="gb">🇬🇧 British voice</button>
<button id="us">🇺🇸 American voice</button>
<button id="stop">⏹ Stop</button>
<div id="log">Ready.</div>
<script>
const logEl=document.getElementById('log');
function log(msg,cls){ logEl.innerHTML+='\n'+(cls?`<span class="${cls}">${msg}</span>`:msg); }
let audio=null;
function ttsUrl(text,lang){
  return "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob"
    +"&tl="+encodeURIComponent(lang)+"&q="+encodeURIComponent(text);
}
function play(text,lang,label){
  if(audio){ audio.pause(); audio=null; }
  logEl.textContent=`Requesting ${label} voice…`;
  const a=new Audio(ttsUrl(text,lang));
  audio=a;
  a.onloadstart =()=>log('• loadstart (request sent)');
  a.oncanplay   =()=>log('• canplay (audio decoded) — should be audible now','ok');
  a.onplaying   =()=>log('• PLAYING ▶  '+(a.duration?`(~${a.duration.toFixed(1)}s)`:''),'ok');
  a.onended     =()=>log('• ended ✓','ok');
  a.onerror     =()=>log('• ERROR: could not load/decode audio (network blocked or region-restricted?)','err');
  a.play().then(()=>log('• play() accepted by browser','ok'))
           .catch(e=>log('• play() BLOCKED: '+e.name+' — '+e.message,'err'));
}
document.getElementById('gb').onclick=()=>play("Hello! This is the British English voice, streaming from the web.","en-GB","British");
document.getElementById('us').onclick=()=>play("Hello! This is the American English voice, streaming from the web.","en-US","American");
document.getElementById('stop').onclick=()=>{ if(audio){audio.pause();audio=null;log('• stopped');} };
</script>
</body>
</html>
