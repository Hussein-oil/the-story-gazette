<!DOCTYPE html>

<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"WebSite",
  "name":"NovaHubs",
  "description":"Free graded English reader with audio and Arabic translation, levels A1 to C1.",
  "inLanguage":"en"
}
</script>
<style>
  :root{
    --bg:#0d1117;
    --surface:#161b22;
    --surface-2:#1c2128;
    --surface-3:#21262d;
    --border:rgba(255,255,255,.08);
    --border-strong:rgba(255,255,255,.16);
    --text:#f0ede8;
    --text-soft:#9ca3af;
    --text-muted:#6b7280;
    --accent:#3fb950;
    --accent-2:#57d96e;
    --accent-dim:rgba(63,185,80,.12);
    --sel:rgba(63,185,80,.15);
    --read:rgba(63,185,80,.22);
    --sans:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    --radius:8px;
    --radius-sm:4px;
    --radius-lg:12px;
    --shadow:0 8px 32px rgba(0,0,0,.5);
    --shadow-sm:0 2px 12px rgba(0,0,0,.3);
    --trans:0.25s ease-in-out;
  }
  [data-theme="light"]{
    --bg:#f0f2f5;
    --surface:#ffffff;
    --surface-2:#edf0f3;
    --surface-3:#e5e8ed;
    --border:rgba(0,0,0,.08);
    --border-strong:rgba(0,0,0,.16);
    --text:#111827;
    --text-soft:#4b5563;
    --text-muted:#9ca3af;
    --accent:#16a34a;
    --accent-2:#15803d;
    --accent-dim:rgba(22,163,74,.10);
    --sel:rgba(22,163,74,.14);
    --read:rgba(22,163,74,.20);
    --shadow:0 8px 32px rgba(0,0,0,.10);
    --shadow-sm:0 2px 12px rgba(0,0,0,.06);
  }
  [data-theme="light"] body{
    background-image:
      linear-gradient(rgba(22,163,74,.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(22,163,74,.06) 1px,transparent 1px);
  }
  [data-theme="light"] #app{background:rgba(240,242,245,.97);}
  [data-theme="light"] nav.topbar{background:rgba(255,255,255,.92);}
  [data-theme="light"] .tb-nav button:hover,[data-theme="light"] .tb-nav a:hover{background:rgba(0,0,0,.04);}
  [data-theme="light"] .levels button.on,
  [data-theme="light"] .btn-primary,
  [data-theme="light"] .ra-play,
  [data-theme="light"] .sp.on,
  [data-theme="light"] .done-btn,
  [data-theme="light"] .mode-toggle button.on{color:#fff;}
  [data-theme="light"] .card:hover .cover{border-color:rgba(22,163,74,.4);box-shadow:0 12px 28px rgba(22,163,74,.10);}
  [data-theme="light"] .art-card:hover{border-color:rgba(22,163,74,.4);box-shadow:0 12px 32px rgba(22,163,74,.06);}
  /* SVG generated covers – override hardcoded dark colours */
  [data-theme="light"] svg.cover:not(.cover-photo) rect:first-of-type{fill:#edf0f3;}
  [data-theme="light"] svg.cover:not(.cover-photo) rect:nth-of-type(2){stroke:rgba(0,0,0,.10);}
  [data-theme="light"] svg.cover:not(.cover-photo) text{fill:rgba(0,0,0,.40);}
  [data-theme="light"] svg.cover:not(.cover-photo) g{stroke:rgba(0,0,0,.40);}
  /* article card banners */
  [data-theme="light"] .ac-cov svg rect:first-of-type{fill:#edf0f3;}
  [data-theme="light"] .ac-cov svg g{stroke:rgba(0,0,0,.40);}
  /* theme toggle button */
  .theme-toggle{background:none;border:none;border-left:1px solid var(--border);cursor:pointer;
    width:46px;height:100%;padding:0;display:flex;align-items:center;justify-content:center;
    color:var(--text-soft);transition:all var(--trans);flex-shrink:0;}
  .theme-toggle:hover{background:rgba(255,255,255,.05);color:var(--text);}
  [data-theme="light"] .theme-toggle:hover{background:rgba(0,0,0,.05);}
  .theme-toggle svg{width:17px;height:17px;display:block;flex-shrink:0;}
  .theme-toggle .icon-moon{display:none;}
  [data-theme="light"] .theme-toggle .icon-sun{display:none;}
  [data-theme="light"] .theme-toggle .icon-moon{display:block;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  html{scrollbar-gutter:stable;scroll-behavior:smooth;}
  body{
    font-family:var(--sans);color:var(--text);min-height:100vh;
    background-color:var(--bg);
    background-image:
      linear-gradient(rgba(63,185,80,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(63,185,80,.04) 1px,transparent 1px);
    background-size:40px 40px;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  #app{
    max-width:1180px;margin:0 auto;min-height:100vh;
    background:rgba(13,17,23,.96);
    border-left:1px solid var(--border);border-right:1px solid var(--border);
    display:flex;flex-direction:column;
  }

  /* masthead */
  header.mast{padding:32px 24px 24px;border-bottom:1px solid var(--border);}
  .mast-top{display:none;}
  .nameplate{font-family:var(--sans);font-weight:800;text-align:center;line-height:1;
    font-size:clamp(36px,8vw,68px);letter-spacing:-2px;margin:0;color:var(--text);}
  .nameplate em{color:var(--accent);font-style:normal;}
  .mast-kicker{text-align:center;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text-muted);margin-top:8px;}
  .mast-rule{display:none;}

  /* sticky nav */
  nav.topbar{
    position:sticky;top:0;z-index:45;
    background:rgba(13,17,23,.92);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:stretch;justify-content:space-between;
  }
  .tb-left{display:flex;align-items:center;padding-left:18px;min-width:0;gap:8px;}
  #wordmark{font-family:var(--sans);font-weight:800;font-size:17px;letter-spacing:-.5px;color:var(--text);}
  #wordmark em{color:var(--accent);font-style:normal;}
  #backTop{display:none;align-items:center;gap:6px;background:none;border:none;cursor:pointer;
    font-size:13px;font-weight:500;color:var(--text-soft);padding:14px 0;transition:color var(--trans);}
  #backTop:hover{color:var(--text);}
  #backTop svg{width:14px;height:14px;}
  .tb-nav{display:flex;height:100%;}
  .tb-nav button,.tb-nav a{background:none;border:none;border-left:1px solid var(--border);cursor:pointer;
    padding:0 20px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    color:var(--text-soft);transition:all var(--trans);text-decoration:none;
    display:flex;align-items:center;position:relative;}
  .tb-nav button:hover,.tb-nav a:hover{color:var(--text);background:rgba(255,255,255,.04);}
  .tb-nav button.on,.tb-nav a.on{color:var(--accent);}
  .tb-nav button.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
  @media(max-width:480px){.tb-nav button,.tb-nav a{padding:0 12px;font-size:11px;} #wordmark{font-size:15px;} main{padding:20px 16px 50px;}}

  main{flex:1;padding:28px 24px 60px;}
  body.reading-mode main{padding-bottom:60px;}
  .wrap{max-width:1080px;margin:0 auto;}
  .wrap-read{max-width:680px;margin:0 auto;}
  .reveal{opacity:0;transform:translateY(12px);animation:rise .45s cubic-bezier(.2,.7,.2,1) forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}

  /* section head */
  .sec-head{margin:0 0 28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .sec-kicker{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
  .sec-title{font-size:clamp(24px,4vw,36px);font-weight:800;line-height:1.1;margin:0 0 8px;letter-spacing:-.5px;}
  .sec-sub{color:var(--text-soft);font-size:15px;line-height:1.65;margin:0;}

  /* level tabs */
  .levels{display:flex;border:1px solid var(--border);margin-bottom:28px;max-width:560px;
    border-radius:var(--radius);overflow:hidden;background:var(--surface);}
  .levels button{flex:1;background:none;border:none;border-right:1px solid var(--border);cursor:pointer;
    padding:12px 4px;font-size:14px;font-weight:700;color:var(--text-soft);transition:all var(--trans);}
  .levels button:last-child{border-right:none;}
  .levels button .lab{display:block;font-size:8px;font-weight:600;letter-spacing:1px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;}
  .levels button.on{background:var(--accent);color:#000;}
  .levels button.on .lab{color:rgba(0,0,0,.55);}
  .levels button:not(.on):hover{background:var(--surface-2);color:var(--text);}

  /* library grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:24px 20px;}
  .card{cursor:pointer;transition:transform var(--trans);}
  .card:hover{transform:translateY(-4px);}
  .cover{width:100%;display:block;background:var(--surface-2);
    border-radius:var(--radius-sm);border:1px solid var(--border);
    box-shadow:var(--shadow-sm);transition:box-shadow var(--trans),border-color var(--trans);}
  .card:hover .cover{border-color:rgba(63,185,80,.4);box-shadow:0 12px 28px rgba(63,185,80,.12);}
  .cap{margin-top:12px;}
  .cap .tt{font-size:15px;font-weight:600;line-height:1.25;color:var(--text);}
  .cap .au{color:var(--text-muted);font-size:12px;margin-top:3px;font-style:italic;}
  .cap .meta{font-size:10px;letter-spacing:.5px;color:var(--text-muted);text-transform:uppercase;
    margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .cover-photo{aspect-ratio:300/420;object-fit:cover;}
  .forth .cover{display:flex;align-items:center;justify-content:center;text-align:center;aspect-ratio:300/420;
    border-style:dashed;box-shadow:none;background:transparent;}
  .forth .ftxt{color:var(--text-muted);font-size:13px;padding:12px;line-height:1.6;}

  /* detail */
  .detail-cover{display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;margin-bottom:24px;}
  .detail-cover .cover{width:200px;flex:none;}
  @media(max-width:520px){.detail-cover .cover{width:140px;}.detail-cover{gap:18px;}}
  .detail-head{flex:1;min-width:220px;}
  .lvl-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:2px;
    text-transform:uppercase;background:var(--accent-dim);color:var(--accent);
    border:1px solid rgba(63,185,80,.3);padding:4px 10px;border-radius:var(--radius-sm);}
  .detail-head h1{font-size:clamp(22px,4vw,32px);font-weight:800;line-height:1.1;margin:12px 0 4px;letter-spacing:-.5px;}
  .detail-head .by{color:var(--text-soft);font-size:14px;font-style:italic;}
  .detail-head .nar{font-size:11px;color:var(--text-muted);letter-spacing:.5px;margin-top:8px;}
  .blurb{font-size:16px;line-height:1.75;margin:24px 0;padding:20px 0;
    border-top:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--text-soft);}
  .specs{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);
    border-radius:var(--radius);margin-bottom:24px;overflow:hidden;background:var(--surface);}
  .specs div{padding:14px 16px;border-right:1px solid var(--border);}
  .specs div:last-child{border-right:none;}
  @media(max-width:520px){
    .specs{grid-template-columns:1fr 1fr;}
    .specs div:nth-child(2n){border-right:none;}
    .specs div:nth-child(-n+2){border-bottom:1px solid var(--border);}
  }
  .specs .k{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
  .specs .v{font-size:18px;font-weight:700;margin-top:5px;color:var(--text);}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;}
  .btn{flex:1;min-width:180px;border:1px solid var(--border);cursor:pointer;font-weight:700;
    letter-spacing:.5px;text-transform:uppercase;font-size:12px;padding:14px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    border-radius:var(--radius);transition:all var(--trans);}
  .btn svg{width:16px;height:16px;}
  .btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
  .btn-primary:hover{background:var(--accent-2);border-color:var(--accent-2);}
  .btn-ghost{background:var(--surface);color:var(--text);}
  .btn-ghost:hover{background:var(--surface-2);border-color:var(--border-strong);}

  /* reader */
  .reader-head{border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:24px;}
  .reader-head h1{font-size:clamp(24px,4.5vw,36px);font-weight:800;line-height:1.1;margin:12px 0 4px;letter-spacing:-.5px;}
  .reader-head .by{color:var(--text-soft);font-size:14px;font-style:italic;}
  .hint{font-size:12px;color:var(--text-muted);line-height:1.65;
    border:1px solid var(--border);padding:12px 16px;margin-bottom:20px;
    background:var(--surface);border-radius:var(--radius-sm);}
  .hint b{color:var(--accent);}
  .mode-toggle{display:flex;border:1px solid var(--border);margin-bottom:20px;max-width:380px;
    border-radius:var(--radius);overflow:hidden;background:var(--surface);}
  .mode-toggle button{flex:1;background:none;border:none;border-right:1px solid var(--border);cursor:pointer;
    padding:10px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    color:var(--text-soft);transition:all var(--trans);}
  .mode-toggle button:last-child{border-right:none;}
  .mode-toggle button.on{background:var(--accent);color:#000;}
  .mode-toggle button:not(.on):hover{background:var(--surface-2);color:var(--text);}
  .story-body{font-size:17px;line-height:1.8;color:var(--text);}
  .story-body p{margin:0 0 24px;text-align:left;}
  .story-body p:first-of-type::first-letter{font-size:58px;font-weight:800;float:left;
    line-height:.8;margin:6px 10px 0 0;color:var(--accent);}
  .w{cursor:pointer;border-radius:2px;padding:0 1px;transition:background var(--trans);}
  .s{cursor:pointer;}
  .word-mode .w:hover{background:var(--sel);}
  .sentence-mode .s:hover{background:var(--sel);}
  .sel{background:var(--sel);box-shadow:0 1px 0 var(--accent);}
  .reading{background:var(--read);box-shadow:0 1px 0 var(--accent);}
  .story-figure{margin:32px auto;max-width:100%;border:1px solid var(--border);padding:8px;
    background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
  .story-fig-row{display:flex;gap:16px;margin:32px 0;}
  .story-fig-row .story-figure{margin:0;flex:1 1 0;min-width:0;}
  .story-img{display:block;width:100%;height:auto;border-radius:var(--radius-sm);}
  .endcap{text-align:center;font-size:11px;letter-spacing:4px;text-transform:uppercase;
    color:var(--text-muted);margin:32px 0 12px;}

  /* bottom dock */
  #dock{position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;justify-content:center;pointer-events:none;}
  body.reading-mode #dock{display:flex;}
  .dock-inner{width:100%;max-width:760px;display:flex;flex-direction:column;pointer-events:auto;
    box-shadow:0 -16px 48px rgba(0,0,0,.6);}
  #sheet{background:var(--surface);border-top:1px solid var(--border-strong);
    max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.2,.9,.3,1);}
  #sheet.up{max-height:65vh;overflow:auto;}
  .sheet-pad{padding:16px 20px 22px;position:relative;}
  .sheet-pad .sclose{position:absolute;right:14px;top:14px;background:none;border:none;cursor:pointer;
    color:var(--text-muted);transition:all var(--trans);width:30px;height:30px;
    display:flex;align-items:center;justify-content:center;border-radius:50%;}
  .sheet-pad .sclose:hover{background:var(--surface-2);color:var(--text);}
  .sheet-pad .sclose svg{width:15px;height:15px;}
  .sheet-kicker{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);}
  .sheet-en{font-size:20px;font-weight:600;line-height:1.35;margin:8px 0 4px;padding-right:36px;color:var(--text);}
  .sheet-ar{direction:rtl;text-align:right;font-size:18px;line-height:1.75;
    color:var(--text-soft);margin-top:14px;padding-top:14px;
    border-top:1px solid var(--border);display:none;}
  .sheet-ar.show{display:block;}
  .sheet-ar.loading{color:var(--text-muted);font-style:italic;}
  .sheet-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin-top:18px;}
  .act{background:var(--surface-2);border:1px solid var(--border);cursor:pointer;padding:12px 6px;
    font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-soft);
    display:flex;flex-direction:column;align-items:center;gap:8px;
    border-radius:var(--radius-sm);transition:all var(--trans);}
  .act svg{width:18px;height:18px;}
  .act:hover{background:var(--surface-3);color:var(--text);border-color:var(--border-strong);}
  .act.saved{background:var(--accent-dim);color:var(--accent);border-color:rgba(63,185,80,.3);}
  .act:active{transform:translateY(1px);}
  body.article-mode #actSave{display:none;}

  /* inline audio player */
  .reader-audio{margin-top:20px;border:1px solid var(--border);background:var(--surface);
    padding:16px 18px;border-radius:var(--radius);}
  .ra-main{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .ra-play{background:var(--accent);color:#000;border:none;cursor:pointer;font-weight:700;
    letter-spacing:.5px;text-transform:uppercase;font-size:12px;
    padding:11px 22px;display:inline-flex;align-items:center;gap:8px;
    border-radius:var(--radius-sm);transition:all var(--trans);flex-shrink:0;}
  .ra-play:hover{background:var(--accent-2);}
  .ra-play svg{width:14px;height:14px;flex-shrink:0;}
  .ra-nav{display:flex;align-items:center;gap:6px;}
  .ra-nav-btn{background:var(--surface-2);border:1px solid var(--border);cursor:pointer;
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    color:var(--text-soft);border-radius:var(--radius-sm);transition:all var(--trans);}
  .ra-nav-btn:hover{background:var(--surface-3);color:var(--text);border-color:var(--border-strong);}
  .ra-nav-btn svg{width:12px;height:12px;}
  .ra-pos{font-size:11px;color:var(--text-muted);min-width:44px;text-align:center;}
  .speed-strip{display:flex;margin-top:14px;border:1px solid var(--border);
    border-radius:var(--radius-sm);overflow:hidden;width:fit-content;}
  .sp{background:var(--surface);border:none;border-right:1px solid var(--border);cursor:pointer;
    font-size:10px;font-weight:600;padding:7px 12px;color:var(--text-muted);transition:all var(--trans);}
  .sp:last-child{border-right:none;}
  .sp:hover{background:var(--surface-2);color:var(--text);}
  .sp.on{background:var(--accent);color:#000;font-weight:800;}

  /* folders */
  .empty{text-align:center;padding:52px 20px;color:var(--text-muted);
    border:1px dashed var(--border);font-size:15px;line-height:1.7;border-radius:var(--radius);}
  .folder-stat{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--border);
    margin-bottom:24px;max-width:560px;border-radius:var(--radius);overflow:hidden;background:var(--surface);}
  .folder-stat div{text-align:center;padding:12px 4px;border-right:1px solid var(--border);}
  .folder-stat div:last-child{border-right:none;}
  .folder-stat .n{font-size:22px;font-weight:800;color:var(--accent);}
  .folder-stat .l{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;}
  .clip-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  .clip{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);overflow:hidden;transition:border-color var(--trans);}
  .clip:hover{border-color:var(--border-strong);}
  .clip .clip-en{font-size:16px;font-weight:500;line-height:1.5;padding:16px 18px 6px;cursor:pointer;color:var(--text);}
  .clip .clip-ar{direction:rtl;text-align:right;font-size:15px;line-height:1.65;color:var(--text-soft);padding:0 18px 6px;}
  .clip .clip-src{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);
    border-top:1px solid var(--border);margin-top:8px;padding:10px 18px;
    display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface-2);}
  .clip .clip-src .from{flex:1;min-width:120px;}
  .clip .clip-tools{display:flex;gap:6px;}
  .clip .ct{background:none;border:1px solid var(--border);cursor:pointer;padding:5px 10px;
    color:var(--text-muted);display:flex;align-items:center;gap:4px;
    font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
    border-radius:var(--radius-sm);transition:all var(--trans);}
  .clip .ct svg{width:11px;height:11px;}
  .clip .ct:hover{background:var(--surface-3);color:var(--text);}
  .clip .ct.del{color:#f85149;border-color:rgba(248,81,73,.4);}
  .clip .ct.del:hover{background:rgba(248,81,73,.1);}

  /* articles */
  .art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}
  .art-card{border:1px solid var(--border);background:var(--surface);cursor:pointer;
    display:flex;flex-direction:column;border-radius:var(--radius);overflow:hidden;transition:all var(--trans);}
  .art-card:hover{border-color:rgba(63,185,80,.4);transform:translateY(-3px);box-shadow:0 12px 32px rgba(63,185,80,.08);}
  .art-card .ac-cov{height:120px;border-bottom:1px solid var(--border);}
  .art-card .ac-cov svg{width:100%;height:100%;display:block;}
  .art-card .ac-body{padding:16px 18px 20px;flex:1;}
  .art-card .ac-kicker{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
  .art-card h3{font-size:17px;font-weight:700;line-height:1.25;margin:0 0 8px;letter-spacing:-.2px;}
  .art-card p{font-size:13px;color:var(--text-soft);line-height:1.55;margin:0;}
  .art-card .ac-meta{font-size:10px;color:var(--text-muted);letter-spacing:.5px;margin-top:12px;text-transform:uppercase;}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--surface-3);color:var(--text);font-size:12px;font-weight:600;letter-spacing:.5px;
    text-transform:uppercase;padding:12px 22px;z-index:90;opacity:0;transition:all .3s ease;pointer-events:none;
    border:1px solid var(--border-strong);border-radius:var(--radius);box-shadow:var(--shadow);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  footer{padding:24px 20px 28px;border-top:1px solid var(--border);text-align:center;
    font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);line-height:2;}

  /* pdf button */
  .dl-pdf-row{margin-top:36px;border-top:1px solid var(--border);padding-top:24px;text-align:center;}
  .dl-pdf{background:var(--surface);border:1px solid var(--border);cursor:pointer;font-weight:700;
    letter-spacing:.5px;text-transform:uppercase;font-size:12px;padding:12px 28px;
    display:inline-flex;align-items:center;gap:9px;color:var(--text-soft);
    border-radius:var(--radius);transition:all var(--trans);}
  .dl-pdf:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-strong);}
  .dl-pdf svg{width:14px;height:14px;flex-shrink:0;}

  /* print / PDF */
  @media print{
    nav.topbar,footer,.mode-toggle,.hint,.reader-audio,#sheet,.toast,.dl-pdf-row{display:none!important;}
    html,body{background:#fff!important;}
    body.reading-mode main{padding-bottom:0!important;}
    main{padding:0!important;}
    .reveal{opacity:1!important;transform:none!important;animation:none!important;}
    .wrap-read{max-width:100%!important;padding:0!important;}
    article{padding:1.5cm 2cm!important;}
    .lvl-tag{background:#111!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .reader-head{border-bottom:2px solid #111;padding-bottom:16px;margin-bottom:20px;}
    .reader-head h1{font-size:26pt;margin:10px 0 4px;color:#111!important;}
    .story-body{font-size:12pt;line-height:1.85;color:#111!important;}
    .story-body p{margin:0 0 14pt;text-align:justify;hyphens:auto;}
    .story-body p:first-of-type::first-letter{color:#333!important;}
    .story-figure{break-inside:avoid;border:1px solid #333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .story-img{width:100%;height:auto;border-radius:0;}
    .endcap{display:block!important;color:#666!important;}
    h1{break-after:avoid;}
    p{orphans:3;widows:3;}
    .done-row,.rev-row{display:none!important;}
  }

  /* quiz */
  .quiz-wrap{max-width:680px;margin:0 auto;}
  .quiz-kicker{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
  .qz-bar-wrap{height:4px;background:var(--surface-2);border-radius:2px;}
  .qz-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
  .quiz-count{font-size:11px;color:var(--text-muted);margin-top:8px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
  .quiz-card{border:1px solid var(--border);padding:28px 24px;background:var(--surface);
    border-radius:var(--radius-lg);margin-top:20px;}
  .qz-type-tag{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
  .qz-q{font-size:clamp(16px,2.5vw,19px);line-height:1.75;margin-bottom:20px;color:var(--text);}
  .qz-blank{color:var(--accent);text-decoration:underline;text-decoration-style:dotted;}
  .qz-input{width:100%;border:1.5px solid var(--border);background:var(--surface-2);
    padding:13px 16px;font-family:var(--sans);font-size:15px;color:var(--text);
    border-radius:var(--radius-sm);outline:none;transition:all var(--trans);}
  .qz-input:focus{border-color:var(--accent);background:var(--surface-3);}
  .qz-input.ok{border-color:#3fb950;background:rgba(63,185,80,.08);}
  .qz-input.err{border-color:#f85149;background:rgba(248,81,73,.07);}
  .qz-feedback{margin-top:14px;padding:12px 16px;font-size:13px;font-weight:500;
    display:none;border-radius:var(--radius-sm);line-height:1.55;}
  .qz-feedback.ok{display:block;background:rgba(63,185,80,.1);border-left:3px solid var(--accent);color:var(--accent);}
  .qz-feedback.err{display:block;background:rgba(248,81,73,.08);border-left:3px solid #f85149;color:#f85149;}
  .qz-btns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;align-items:center;}
  .qz-ar{font-size:20px;direction:rtl;text-align:right;color:var(--text);
    padding:16px 18px;border:1px solid var(--border);margin-bottom:20px;
    background:var(--surface-2);border-radius:var(--radius-sm);line-height:1.65;}
  .qz-mic{background:var(--surface-2);border:1px solid var(--border);cursor:pointer;font-weight:700;
    letter-spacing:.5px;text-transform:uppercase;font-size:11px;padding:11px 20px;
    display:inline-flex;align-items:center;gap:8px;color:var(--text);
    border-radius:var(--radius-sm);transition:all var(--trans);}
  .qz-mic:hover,.qz-mic.active{background:var(--accent);color:#000;border-color:var(--accent);}
  .qz-mic svg{width:14px;height:14px;flex-shrink:0;}
  .qz-skip{background:none;border:none;cursor:pointer;font-size:12px;
    color:var(--text-muted);text-decoration:underline;padding:4px 0;transition:color var(--trans);}
  .qz-skip:hover{color:var(--text-soft);}
  .qr-ring{width:96px;height:96px;border-radius:50%;border:3px solid var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:800;margin:0 auto 20px;color:var(--text);background:var(--accent-dim);}
  .qr-label{font-size:24px;font-weight:700;margin-bottom:8px;text-align:center;}
  .qr-sub{font-size:15px;color:var(--text-soft);margin-bottom:28px;line-height:1.5;text-align:center;}
  .qr-list{border:1px solid var(--border);margin-bottom:24px;border-radius:var(--radius);overflow:hidden;}
  .qr-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;}
  .qr-row:last-child{border-bottom:none;}
  .qr-ok{color:var(--accent);font-weight:700;font-size:15px;}
  .qr-no{color:#f85149;font-weight:700;font-size:15px;}
  .qz-results{padding:40px 20px;}
  .done-row{margin-top:32px;text-align:center;}
  .done-btn{background:var(--accent);color:#000;border:none;cursor:pointer;font-weight:700;
    letter-spacing:.5px;text-transform:uppercase;font-size:13px;padding:16px 36px;
    display:inline-flex;align-items:center;gap:10px;border-radius:var(--radius);transition:all var(--trans);}
  .done-btn:hover{background:var(--accent-2);}
  .done-btn svg{width:17px;height:17px;}
  .rev-row{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center;}
  .rev-btn{background:var(--surface);border:1px solid var(--border);cursor:pointer;font-weight:700;
    letter-spacing:.5px;text-transform:uppercase;font-size:12px;padding:13px 30px;
    display:inline-flex;align-items:center;gap:9px;color:var(--text);
    border-radius:var(--radius);transition:all var(--trans);}
  .rev-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
  .rev-btn svg{width:14px;height:14px;}
  .qz-dict-hint{font-size:14px;color:var(--text-soft);margin-bottom:18px;line-height:1.6;}
  .qz-word-result{font-size:18px;line-height:2.4;font-weight:500;}
  .qw-ok{background:rgba(63,185,80,.2);border-radius:3px;padding:2px 6px;color:var(--text);}
  .qw-close{background:rgba(250,204,21,.15);border-radius:3px;padding:2px 6px;color:var(--text);}
  .qw-miss{background:rgba(248,81,73,.15);border-radius:3px;padding:2px 6px;text-decoration:line-through;opacity:.7;color:var(--text);}
  .qz-spoken-line{font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic;}
</style>
</head>
<body>
<div id="app">
  <header class="mast">
    <div class="mast-top"><span>Vol. I — No. 1</span><span>Free Reading Edition</span></div>
    <div class="nameplate">Nova<em>Hubs</em></div>

  </header>

  <nav class="topbar">
    <div class="tb-left">

      <span id="wordmark">Nova<em>Hubs</em></span>

  <footer>

<!-- bottom dock: selection sheet stacked ABOVE the audio bar -->
<div id="dock">
  <div class="dock-inner">

      <div class="sheet-pad">
        <button class="sclose" id="sheetClose" aria-label="close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 5l14 14M19 5L5 19"/></svg>
        </button>
        <div class="sheet-kicker" id="sheetKicker">Selected Word</div>

        <div class="sheet-actions">
          <button class="act" id="actListen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 8.5a4 4 0 010 7"/></svg>Listen</button>
          <button class="act" id="actSlow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 9.5a3 3 0 010 5"/></svg>Slow</button>

          <button class="act" id="actSave"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v16l-6-4-6 4V4z"/></svg>Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<noscript>
  <div style="padding:30px;font-family:Georgia,serif;">
    <h1>NovaHubs — Learn English by Reading</h1>
    <p>NovaHubs is a free graded reader. Read short English stories from level A1 to C1, listen to every
    word or sentence, translate to Arabic, and save sentences into folders by level. Please enable JavaScript to use the reader.</p>

const M = {

let coverUID=0;
function cover(motif, label, accent, coverImg){
  if(coverImg) return `<img src="${esc(coverImg)}" class="cover cover-photo" alt="">`;
  const uid="ht"+(++coverUID);
  return `<svg class="cover" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs><pattern id="${uid}" width="7" height="7" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="${accent}" opacity="0.3"/></pattern></defs>
    <rect width="300" height="420" fill="#161b22"/>
    <rect x="10" y="10" width="280" height="400" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <rect x="16" y="16" width="268" height="388" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="24" y1="52" x2="276" y2="52" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="150" y="40" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="4" fill="rgba(255,255,255,0.35)">NOVAHUBS</text>
    <circle cx="252" cy="78" r="22" fill="${accent}" opacity="0.92"/>
    <text x="252" y="83" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="13" fill="#000">${label}</text>

const STORIES = [
  { id:"a1-1", level:"A1", motif:"door", title:"The Red Door", author:"E. Hartwell",
    blurb:"A quiet man, a small bird, and a door the colour of morning. Sometimes a friend is the smallest thing in the garden.",
    images:["images/A1/1.webp",["images/A1/2.webp","images/A1/3.webp"],"images/A1/4.webp"],
    body:[
      "Tom lives in a small town. His house is white. The door is red. Every morning, he opens the red door. He looks at the sky. The sky is blue. A small bird sits on the wall. The bird is brown.",
      "\"Good morning, bird,\" says Tom. The bird looks at him. Then it flies away. Tom walks to the shop. He buys bread and milk. The shop is near the park. In the park, children play. A dog runs after a ball. Tom smiles. He likes the park.",
      "At noon, Tom goes home. He opens the red door again. He makes tea. He sits by the window. The brown bird comes back. It sits on the wall. Tom is happy. \"You are my friend,\" he says. The bird sings a little song. Tom drinks his tea. It is a good day."
    ]},
  { id:"a1-2", level:"A1", motif:"cat", title:"Anna and the Cat", author:"M. Foley",
    blurb:"Pip the cat likes milk and sleep. But one afternoon Pip is gone, and a small search begins in the garden.",
    body:[
      "Anna has a cat. The cat is black and white. Its name is Pip. Pip is small. Pip likes milk. Every day, Anna gives Pip some milk. Pip drinks the milk. Then Pip sleeps on the bed.",
      "One day, Pip is not in the house. Anna looks in the kitchen. No cat. She looks under the bed. No cat. She looks in the garden. There is Pip! Pip is in a tree. \"Come down, Pip,\" says Anna. But Pip does not come down.",
      "Anna gets a chair. She stands on the chair. She takes Pip in her arms. \"You are a bad cat,\" she says. But she is not angry. She loves Pip. They go into the house. Anna gives Pip some milk. Pip is happy now. Pip sleeps on the bed again."
    ]},
  { id:"a1-3", level:"A1", motif:"market", title:"A Day at the Market", author:"R. Okonkwo",
    blurb:"On Saturday the market is full of colour and noise. Mrs. Lee has a basket, a few coins, and a soft spot for one pink flower.",
    body:[
      "It is Saturday. Mrs. Lee goes to the market. The market is big. There are many people. There are red apples and green pears. There is yellow cheese and fresh fish. Mrs. Lee has a basket.",
      "\"How much is the bread?\" she asks. \"Two coins,\" says the man. Mrs. Lee buys the bread. She buys apples too. The apples are sweet. She buys some fish for dinner.",
      "A little girl sells flowers. The flowers are white and pink. \"Please buy a flower,\" says the girl. Mrs. Lee buys one pink flower. She gives the girl a coin. \"Thank you,\" says the girl.",
      "Mrs. Lee goes home. Her basket is full. She is tired but happy. At home, she puts the flower in water. The kitchen smells good."
    ]},
  { id:"a1-4", level:"A1", motif:"tree", title:"The Apple Tree", author:"H. Blake",
    blurb:"An old tree, a yellow bird, and a cool red apple. Tom finds that the best things in life are already growing outside the door.",
    body:[
      "Tom has a small garden behind his house. In the garden, there is a big tree. The tree is very old. It has green leaves and many red apples. Tom loves the tree. Every morning, he goes outside and looks at it.",
      "One day, Tom sees a small yellow bird in the tree. The bird sits on a branch and sings. Tom stands under the tree and listens. The song is beautiful. He does not move. The bird looks at him and sings again.",
      "Tom picks one red apple from the tree. It is sweet and cold. He eats it slowly. Then a cat walks into the garden. The cat sees the bird and stops. But the bird flies away. The cat sits under the tree and looks at Tom.",
      "In the afternoon, Tom's sister, Lisa, comes to the garden. She looks at the tree. \"It is beautiful!\" she says. Tom gives her an apple. They sit under the tree together. The sun is warm. It is a good afternoon."
    ]},
  { id:"a2-1", level:"A2", motif:"key", title:"The Lost Key", author:"J. Marlowe",
    blurb:"Daniel is late, and his key is nowhere to be found. The rescue comes from the last place he thought to look: next door.",
    body:[
      "Daniel was late for work. He put on his coat and looked for his key. It was not on the table. It was not in his pocket. He looked everywhere, but he could not find it.",
      "\"Where did I leave it?\" he asked himself. He remembered the night before. He had come home in the rain. He had been very tired. Perhaps the key was still in the door? He ran outside, but the key was not there.",
      "Then he saw his neighbour, Mrs. Carter. She was holding something shiny. \"Is this yours?\" she asked with a smile. \"I found it on the path last night.\" It was his key! Daniel was so happy. \"Thank you so much,\" he said. \"You saved my morning.\"",
      "He took the key, locked the door carefully, and hurried to the bus. This time, he was only a little late."
    ]},
  { id:"a2-2", level:"A2", motif:"train", title:"The Night Train", author:"S. Bellamy",
    blurb:"A girl travels alone toward the mountains. An old man with a newspaper makes her a quiet promise about the morning.",
    body:[
      "The night train left the city at ten o'clock. Sara sat by the window with a small bag on her knees. Outside, the lights of the houses grew smaller and smaller. Soon there was only darkness and the sound of the wheels.",
      "An old man sat opposite her. He was reading a newspaper. After some time, he looked up. \"Are you travelling far?\" he asked kindly. \"To the mountains,\" said Sara. \"My grandmother lives there. I have not seen her for two years.\"",
      "The old man nodded. \"The mountains are beautiful in the morning,\" he said. \"When the sun comes up, you will see the snow on the high peaks.\" Sara smiled. She closed her eyes and tried to sleep. The train moved through the quiet night.",
      "When she woke up, the sky was turning pink, and far away she could see the mountains, white and bright, just as the old man had promised."
    ]},
  { id:"a2-3", level:"A2", motif:"map", title:"The Old Map", author:"P. Greaves",
    blurb:"Behind the old books, James finds a yellow map with a small red cross. What waits at the river is not gold, but something he keeps forever.",
    body:[
      "In the corner of the library, behind the old books, James found a map. It was very old. The paper was yellow and soft. There were strange marks on it, and a small red cross near the river.",
      "\"What is this place?\" he thought. He showed the map to his sister, Lucy. \"Maybe it is treasure,\" she said with bright eyes. \"Let's find out!\" The next morning, they took the map and walked to the river.",
      "They followed the old path between the trees. The map was difficult to read, but at last they came to a big stone near the water. Lucy looked behind the stone. There was a small metal box!",
      "Inside the box, there was no gold. There were old letters and a photograph of two children, long ago. \"It is not treasure,\" said James quietly. \"It is a memory.\" They put the box back, but they kept the map forever."
    ]},
  { id:"a2-4", level:"A2", motif:"lamp", title:"The Birthday Surprise", author:"T. Lawson",
    blurb:"Omar has an idea, a few friends, and very little money. Sometimes the best gifts are the ones nobody had to buy.",
    body:[
      "It was Emma's birthday next Saturday. Her friend, Omar, wanted to make it special. He knew that Emma loved flowers, books, and chocolate cake. But he did not have much money, and the shops were very expensive. He thought about it for two days. Then he had an idea. He called their other friends — Yuki, Carlos, and Sophie — and told them his plan. They all agreed. It was going to be a good surprise.",
      "On Friday afternoon, they met at Omar's house. Yuki brought flowers from her garden: yellow and white ones. Carlos made a chocolate cake at home. It was not very beautiful, but it smelled wonderful. Sophie found a small book of poems in a second-hand shop and wrapped it in blue paper. Omar cleaned his kitchen and put a white cloth on the table. By seven o'clock, everything was ready.",
      "They sent a message to Emma and asked her to come to Omar's house. They said only that they needed her help with something. Emma was a little surprised, but she came. When she opened the door, the room was dark. Then the lights came on. All her friends shouted \"Happy birthday!\" Emma stopped. She looked at the flowers, the cake, and the small blue present on the table. Her eyes became wet. \"I didn't know you remembered,\" she said quietly.",
      "They had dinner together. Carlos's cake was a little too sweet, but everyone ate two pieces. Yuki told a funny story about the flowers — she had to carry them on the bus, and a woman thought she was going to a wedding. They all laughed. After dinner, Emma opened her present. She read the first poem out loud. It was about friendship. Nobody spoke when she finished. Then Omar smiled and said, \"Shall we have more cake?\"",
      "Emma stayed until late. When she left, she hugged everyone at the door. The night was cold and the street was quiet. She walked home slowly. She moved to the city only one year ago, and sometimes she felt lonely. But tonight was different. She put her hand in her coat pocket and felt the small book. She smiled and walked faster."
    ]},
  { id:"b1-1", level:"B1", motif:"lighthouse", title:"The Lighthouse Keeper", author:"A. Whitlock",
    blurb:"For thirty years Edward has kept the light on Grey Rock. On the worst night of the year, a small steady flame becomes everything.",
    body:[
      "For thirty years, Edward had kept the lighthouse on Grey Rock. Every evening, as the sun sank into the sea, he climbed the narrow stairs and lit the great lamp. Its light turned slowly through the night, warning ships of the dangerous rocks below.",
      "Edward lived alone, but he was never truly lonely. He knew every bird that nested on the cliffs and every change in the colour of the water. The sailors who passed never saw his face, yet they trusted him completely. His light meant that someone was watching, that the way home was safe.",
      "One stormy night, the wind screamed and the waves rose like grey mountains. Through the rain, Edward saw a small fishing boat in trouble, too close to the rocks. He could not reach it, but he did the only thing he could: he kept the lamp burning, bright and steady. The fishermen saw the light and turned their boat just in time.",
      "The next morning, the sea was calm again. A young fisherman climbed up to the lighthouse to say thank you. \"We would have died without your light,\" he said. Edward only smiled. \"That is why I am here,\" he answered. \"A light is a small thing, but on a dark night, it can be everything.\""
    ]},
  { id:"b1-2", level:"B1", motif:"clock", title:"The Clockmaker's Daughter", author:"L. Renner",
    blurb:"In a shop full of ticking hearts, Mira inherits her father's craft, and learns why a single tiny spring can return a man his grandfather.",
    body:[
      "In a quiet street in the old town, there was a small shop full of clocks. They covered every wall, and all day long they ticked together like a hundred small hearts. The shop belonged to Mr. Albrecht, an old clockmaker, and his daughter, Mira.",
      "Mira had grown up among the clocks. She knew how to open them, clean them, and listen to their tiny voices. Her father had taught her that every clock had a character of its own. \"Some are nervous, some are lazy, and some are proud,\" he used to say with a smile.",
      "When her father became ill, the work of the shop fell to Mira. Many customers were surprised to find a young woman behind the counter. \"Can she really fix a clock?\" they whispered. But when they saw how carefully she worked, their doubts disappeared.",
      "One day, a rich man brought in a clock that no one in the city could repair. It had belonged to his grandfather, and it had been silent for many years. Mira worked on it for three days. She found a broken spring, no bigger than a hair, deep inside the machine.",
      "When she finished, the clock began to tick again, soft and steady. The man had tears in his eyes. \"You have given my grandfather back to me,\" he said. And Mira understood, at last, why her father loved his work so much."
    ]},
  { id:"b1-3", level:"B1", motif:"ship", title:"Letters from the Sea", author:"C. Doran",
    blurb:"An old sailor's letters teach his niece about distant ports, and about the one harbour he most wanted to reach.",
    body:[
      "Every summer, when she was young, Helen visited her uncle by the sea. He had once been a sailor, and his house was full of strange objects from faraway places: shells, maps, and a brass telescope that smelled of salt.",
      "The thing Helen loved most was a wooden box of letters. They had been written by her uncle to his family, many years before, from ships all over the world. In them, he described storms and quiet seas, foreign ports and the friends he had made. Helen read them again and again until she knew them almost by heart.",
      "\"Why did you stop sailing?\" she asked him one evening, as they watched the waves. The old man was quiet for a moment. \"Because one day I realised that the place I most wanted to reach was home,\" he said. \"The sea taught me many things, but it also taught me what I had left behind.\"",
      "Years later, when her uncle had died, Helen found the box of letters again. This time she added one of her own, written to him, full of all the things she had never said. She did not post it, of course. She simply placed it in the box with the others and closed the lid gently, as if she were closing a door between two worlds."
    ]},
  { id:"b2-1", level:"B2", motif:"house", title:"The House on Marsh Lane", author:"V. Ashcombe",
    blurb:"A writer buys a house the village would rather forget. What she finds inside is not ghosts, but the traces of those who lived and lost there.",
    body:[
      "No one had lived in the house on Marsh Lane for nearly twenty years, and the village had grown used to its silence. Children dared one another to touch its gate; older people simply looked away when they passed, as though the building reminded them of something they preferred to forget.",
      "When Clara bought the house, the villagers were polite but distant. She was an outsider, a writer from the city who claimed she wanted \"peace and quiet.\" What she found instead was a house full of voices, not ghosts exactly, but the traces of the people who had lived there: a child's height marked in pencil on a doorframe, initials carved into a windowsill, a faded photograph left in a drawer.",
      "As the weeks passed, Clara became curious. She began to ask questions in the village shop, and slowly the story came out. The house had belonged to a family that had lost everything in a single hard winter. After that, the place had simply been left to the damp and the wind.",
      "Clara could have sold the house and moved on. Instead, she stayed. She repaired the broken windows and planted a garden where the marsh had crept too close. Little by little, the villagers began to visit. They brought stories of their own, and the house, which had been a monument to loss, slowly became something else: a place where the past was remembered without fear."
    ]},
  { id:"b2-2", level:"B2", motif:"gears", title:"The Watchmaker of Vienna", author:"H. Strauss",
    blurb:"The finest watchmaker in Vienna measures time for everyone but himself, until a clumsy apprentice teaches him how to spend it.",
    body:[
      "Herr Brandt was, by any reasonable measure, the finest watchmaker in Vienna. His instruments were so precise that the city's musicians used them to keep time, and so beautiful that wealthy families passed them down from one generation to the next. Yet for all his skill, Herr Brandt was a deeply unhappy man.",
      "The problem, as he saw it, was time itself. He spent his days measuring it, dividing it into ever smaller pieces, and yet he felt that his own life was slipping through his fingers, unmeasured and unlived. He had no family, few friends, and no memory of the last time he had laughed without thinking of work.",
      "One winter, a young apprentice named Lotte came to work in his shop. She was clumsy at first, and impatient, but she possessed something that Herr Brandt had lost long ago: a sense of wonder. She would hold a finished watch to her ear and listen as though it were telling her a secret. She asked endless questions, not about how watches worked, but about why they mattered.",
      "Slowly, almost against his will, Herr Brandt began to change. He started to take walks in the afternoon. He noticed the light on the river and the sound of bells across the city. When at last he gave Lotte her own bench in the shop, he realised that the most valuable thing he had ever made was not a watch at all, but the time he had finally learned to spend."
    ]},
  { id:"b2-3", level:"B2", motif:"mountains", title:"Smoke over the Valley", author:"D. Petrova",
    blurb:"As wildfire crawls down the mountain, an old man refuses to leave his orchard. His granddaughter stays to learn what the land remembers.",
    body:[
      "The fire had started somewhere high in the mountains, and for three days the wind had carried it steadily down toward the valley. From the village, the people watched the line of smoke grow thicker, an orange glow appearing at night above the dark shape of the hills.",
      "Most of the younger families had already packed their cars and left. But old Mr. Sava refused to go. He had lived in the same stone house all his life, as had his father before him, and he could not imagine abandoning the orchard he had spent fifty years tending. \"The trees cannot run,\" he said simply. \"So neither will I.\"",
      "His granddaughter, Mira, stayed with him, though she was afraid. Together they cleared the dry grass around the house and soaked the roof with water from the well. They worked until their hands were raw and the sky had turned the colour of rust. When the fire finally reached the edge of their land, they stood together and watched, ready to run if they had to.",
      "But the wind changed. In the cool of the early morning, rain began to fall, light at first, then heavy and steady, and the fire died into hissing smoke. The orchard was scorched at its edges, but it had survived. Mr. Sava knelt and touched the wet earth. \"You see,\" he said quietly to his granddaughter, \"the land remembers those who stay.\""
    ]},
  { id:"c1-1", level:"C1", motif:"map", title:"The Cartographer's Confession", author:"A. Reyes",
    blurb:"For forty years he drew coastlines he had never seen. Near the end, the most honest map he ever made was of the limits of his own knowledge.",
    body:[
      "For the better part of forty years, Augustin Reyes had drawn maps for an empire that no longer existed. He had charted coastlines that other men had only glimpsed through fog, named rivers that no European had previously crossed, and filled the blank spaces of distant continents with mountains, forests, and the occasional, half-imagined beast. His maps hung in palaces and naval academies; his reputation was, in the language of his time, beyond reproach.",
      "And yet, in the quiet of his study, Augustin kept a secret that would have destroyed him. Many of the lands he had drawn so confidently, he had never seen. He had inferred them, guessed at them, stitched them together from the contradictory reports of sailors who were often drunk and always exaggerating. Where the evidence ran out, he had simply continued the line, trusting that the world would be kind enough to match his imagination.",
      "Most of the time, it was. But occasionally, ships sailed by his maps and found nothing where he had promised a harbour, or rocks where he had drawn open water. Men had died, he understood, following the elegant certainty of his ink. This knowledge sat in him like a stone.",
      "Near the end of his life, Augustin began a final map, not of any real place, but of the limits of his own knowledge. He marked, with painful honesty, every coast he had invented and every river he had imagined. He labelled the vast interior of his most famous continent with a single phrase, repeated in his careful hand: \"Here I did not know.\" It was, he thought, the truest thing he had ever drawn. He left it unsigned, and asked that it be burned. His apprentice, who loved him, did not."
    ]},
  { id:"c1-2", level:"C1", motif:"tree", title:"An Inheritance of Silence", author:"E. Vance",
    blurb:"After eleven years of estrangement, Eleanor inherits her quiet aunt's house, and discovers that silence was never the same thing as indifference.",
    body:[
      "When the lawyer's letter arrived, Eleanor had not spoken to her family in eleven years. The estrangement had been gradual rather than dramatic, not a single quarrel but a slow accumulation of unanswered calls and unsaid things, until the silence between them had hardened into something that felt permanent. So it was with a peculiar sense of unreality that she read that her aunt Margaret had died and left her the house in the country, along with everything in it.",
      "She had not expected to be remembered at all. Margaret had always been the most reserved of her relatives, a woman who measured her words as though they were expensive, and who had watched the family's quarrels from a distance with an expression that gave nothing away. Eleanor had assumed, in the careless way of the young, that her aunt simply did not care.",
      "The house, when she finally visited, told a different story. In the attic, Eleanor found boxes carefully labelled in Margaret's handwriting, each containing things that belonged to a different member of the family: a child's drawing, a wedding invitation, a newspaper clipping about a graduation. Her aunt, it seemed, had been quietly collecting the family's life for decades, preserving the very connections that the rest of them had been so careless to break.",
      "At the bottom of one box, Eleanor found a letter addressed to her, written years before, and never sent. It was brief. \"I am not good with words,\" her aunt had written, \"so I have kept things instead. When you are ready, they will tell you that you were always loved.\" Eleanor sat on the dusty floor of the attic for a long time. The silence around her, she realised, had never been emptiness. It had been a kind of waiting."
    ]},
  { id:"c1-3", level:"C1", motif:"theatre", title:"The Last Performance", author:"V. Mercer",
    blurb:"A forgotten actress is offered a role of a single scene. In a few minutes of stage light, she rediscovers what the work was always for.",
    body:[
      "Vivienne Mercer had been a great actress, once. The theatres of three continents had emptied their seats for her; critics had exhausted their vocabularies trying to describe what she did on a stage. But that had been a long time ago, and the public, which adores nothing so much as a new face, had gradually forgotten the old one. By the time she was seventy, Vivienne lived alone in a small flat above a bakery, surrounded by the photographs of a woman who no longer seemed to exist.",
      "When a young director approached her about a new play, she assumed at first that it was a mistake, or worse, an act of charity. The role was small, an old woman who appears in a single scene and speaks for no more than a few minutes. Vivienne nearly refused. Her pride, which had survived everything else, recoiled at the idea of returning to the stage as a footnote.",
      "But something in the lines stayed with her. The character, like Vivienne herself, was a person whom the world had decided to overlook, and the few minutes she was given were her only chance to insist that she had existed, that she had mattered. Vivienne understood the part completely, because she was living it.",
      "On opening night, she walked onto the stage for the first time in fifteen years. The audience, who did not recognise her, grew quiet not out of respect but out of attention, for there was something in the way this old woman held the silence that made them lean forward in their seats. When she finished, there was a pause, the rarest and most honest of all theatrical sounds, before the applause began.",
      "Vivienne stood very still in the light. She had not come back to be remembered, she realised. She had come back to remind herself of what she had always known: that the work, and not the fame, had been the point all along."
    ]}
];

const ARTICLES = [
  { id:"art-1", motif:"book", kicker:"Method", title:"How to Learn English by Reading Short Stories", author:"The NovaHubs Editors", date:"Reading Guide",
    excerpt:"Short stories give you complete, meaningful language in a small package. Here is how to turn them into real progress.",
    body:[
      "Reading short stories is one of the most effective and pleasant ways to learn a language. Unlike isolated word lists, a story gives you whole sentences in a real context. You see how words behave, which other words they keep company with, and what they actually mean when people use them.",
      "Begin with a level that feels slightly easy. If you understand almost every word, you can pay attention to rhythm and meaning rather than struggling. As your confidence grows, move up one level at a time. The jump from A1 to A2, or B1 to B2, should feel like a gentle step, not a cliff.",
      "Read each story twice. The first time, read for the story itself: enjoy it, follow the characters, and do not stop for every unknown word. The second time, read more slowly. Now you can tap the words you did not know, listen to them, and save the sentences that taught you something.",
      "Finally, return to your saved sentences a few days later. The act of meeting a sentence again, in your own collection, is what moves it from short-term memory into lasting knowledge. Reading builds the input; reviewing turns it into ability."
    ]},
  { id:"art-2", motif:"ear", kicker:"Listening", title:"The Power of Slow Listening: Training Your Ear", author:"The NovaHubs Editors", date:"Listening Guide",
    excerpt:"Native speech is fast. Slowing it down, on purpose, is one of the fastest ways to understand it at full speed.",
    body:[
      "Many learners can read a sentence perfectly but freeze when they hear it spoken. The reason is simple: the eye can pause, but the ear cannot. Spoken English connects words, drops sounds, and moves quickly. Your ear needs training, and slow listening is the gym.",
      "When you slow a sentence down, you can hear each individual sound and where one word ends and the next begins. This is the moment your brain builds a clear picture of the sentence. Listen slowly two or three times until the shape of the sentence is familiar.",
      "Then switch back to normal speed. Suddenly, the same sentence that sounded like noise becomes a row of words you recognise. This contrast, between slow and normal, is the lesson. It teaches your ear what the fast version is really made of.",
      "Use slow listening for difficult sentences only. For everything else, listen at normal speed, because that is the speed you will meet in conversation. Slow is the practice room; normal is the performance."
    ]},
  { id:"art-3", motif:"quill", kicker:"Memory", title:"Build a Sentence Bank: Why Saving Sentences Works", author:"The NovaHubs Editors", date:"Vocabulary Guide",
    excerpt:"Single words are slippery. Whole sentences stick. A personal sentence bank is the quiet engine of real fluency.",
    body:[
      "When you save a single word, you save only half of what you need. You may remember the word but forget how to use it, which preposition follows it, or which tense it lives in. When you save a full sentence, you keep all of that information together, exactly as a native speaker would use it.",
      "A sentence bank is simply a personal collection of the sentences that taught you something. The best sentences to save are not the hardest ones, but the most useful ones: sentences you can imagine saying yourself one day.",
      "Organise your bank by level, and keep a note of where each sentence came from. The story behind a sentence is a powerful memory hook. Months later, you will recall not just the words, but the lighthouse, the night train, or the quiet aunt who kept the family's letters.",
      "Review your bank in short, frequent sessions rather than long, rare ones. Five minutes a day will teach you more than one hour a week. Fluency is built from many small returns to the same material."
    ]},
  { id:"art-4", motif:"map", kicker:"Roadmap", title:"From A1 to C1: A Practical Reading Roadmap", author:"The NovaHubs Editors", date:"Level Guide",
    excerpt:"The CEFR levels are not mysterious. Here is what each one means for a reader, and how to know when you are ready to climb.",
    body:[
      "The Common European Framework, or CEFR, describes language ability in six levels, from A1 to C2. For a reader, these levels are a helpful map. They tell you what kind of text to expect and how much effort it will demand.",
      "At A1 and A2, sentences are short and direct. You read about everyday life: homes, food, family, simple journeys. The goal is to feel comfortable and to build a base of the most common words, which carry most of the meaning in any language.",
      "At B1 and B2, the text grows. Sentences join together, characters have feelings and reasons, and the writer expects you to follow ideas across paragraphs. This is where reading becomes truly interesting, because the stories begin to reward attention.",
      "At C1, the language becomes literary. Writers use nuance, irony, and long sentences that hold several ideas at once. You are no longer just understanding the words; you are appreciating the choices behind them. Move up only when your current level feels genuinely comfortable, and the climb will feel natural."
    ]},
  { id:"art-5", motif:"lamp", kicker:"Practice", title:"Reading Aloud: How Your Voice Helps You Remember", author:"The NovaHubs Editors", date:"Speaking Guide",
    excerpt:"Reading silently uses one channel. Reading aloud uses three at once, and that is exactly why it works so well.",
    body:[
      "When you read silently, you use your eyes. When you read aloud, you add two more channels: your voice, which shapes the sounds, and your ears, which hear them. Three channels working together build a much stronger memory than one channel alone.",
      "Reading aloud also reveals the music of English. You feel where the stress falls, where a sentence rises, and where it pauses. These patterns are part of meaning, and you cannot truly own a sentence until you can say it with the right rhythm.",
      "A good method is to listen first, then imitate. Play a sentence, listen to how it moves, and then say it yourself in the same way. Compare. Adjust. Repeat until your version sounds close to the original. This is gentle, private practice with no audience and no pressure.",
      "Do this for just a few sentences from each story you read. Over weeks, your mouth learns the shapes that your eyes already know, and the gap between reading and speaking quietly closes."
    ]}
];

const LEVELS = ["A1","A2","B1","B2","C1"];
const LEVEL_DESC = {
  A1:"Beginner — short sentences, present tense",
  A2:"Elementary — everyday past and future",
  B1:"Intermediate — longer narrative, feeling",
  B2:"Upper-intermediate — nuance and atmosphere",
  C1:"Advanced — literary prose and complexity"
};
const ACCENTS = { A1:"#4ade80", A2:"#60a5fa", B1:"#fb923c", B2:"#fbbf24", C1:"#a78bfa" };

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const view = $("#view");
const wordCount = o => o.body.join(" ").trim().split(/\s+/).length;
const readMin = o => Math.max(1, Math.round(wordCount(o)/130));
function esc(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* ---------- storage (artifact storage if present, else localStorage, else memory) ---------- */
const hasArtifactStore = (typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");
function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
const mem={};
async function loadJSON(key, fallback){
  if(hasArtifactStore){ try{ const r=await window.storage.get(key,false); return r&&r.value?JSON.parse(r.value):fallback; }catch(e){ return fallback; } }
  const v=lsGet(key); if(v){ try{return JSON.parse(v);}catch(e){} }
  return (key in mem)?mem[key]:fallback;
}
async function saveJSON(key, obj){
  const s=JSON.stringify(obj); mem[key]=obj;
  if(hasArtifactStore){ try{ await window.storage.set(key,s,false); }catch(e){} }
  lsSet(key,s);
}
let SAVED={}; let TR={};
LEVELS.forEach(l=>SAVED[l]=[]);

/* ---------- text to speech ---------- */
let VOICE=null;
function pickVoice(){
  if(!("speechSynthesis" in window)) return;
  const vs=speechSynthesis.getVoices();
  VOICE=vs.find(v=>/en[-_]GB/i.test(v.lang))||vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||vs[0]||null;
}
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text, rate, onend){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=VOICE?VOICE.lang:"en-GB"; if(VOICE) u.voice=VOICE;
  u.rate=rate; u.pitch=1; if(onend) u.onend=onend;
  speechSynthesis.speak(u);
}

/* ---------- translation (free public APIs, works in any browser) ---------- */
async function translate(text){
  const key=text.trim();
  if(TR[key]) return TR[key];
  // 1) Google public endpoint
  try{
    const r=await fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q="+encodeURIComponent(key));
    if(r.ok){ const d=await r.json(); const out=(d[0]||[]).map(s=>s[0]).join("").trim();
      if(out){ TR[key]=out; saveJSON("nh-tr",TR); return out; } }
  }catch(e){}
  // 2) MyMemory fallback
  try{
    const r=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(key)+"&langpair=en|ar");
    if(r.ok){ const d=await r.json(); const out=(d.responseData&&d.responseData.translatedText||"").trim();
      if(out){ TR[key]=out; saveJSON("nh-tr",TR); return out; } }
  }catch(e){}
  return "Translation unavailable — please check your internet connection.";
}

/* ---------- state ---------- */
let curLevel="A1", curStory=null, curArticle=null, isArticle=false;
let mode="word", selText="", sentenceEls=[];
let abIndex=0, abPlaying=false, abRate=1;

}

}

/* ---------- views ---------- */
function leaveReader(){ document.body.classList.remove("reading-mode","article-mode"); hideSheet(); stopAudio(); }

function setNav(section){
  if(section==="library") renderLibrary();
  else if(section==="articles") renderArticles();
  else renderSaved();
}

function renderLibrary(){
  leaveReader(); setActiveNav("library"); setBack(false);
  const stories=STORIES.filter(s=>s.level===curLevel);
  const tabs=LEVELS.map(l=>`<button data-level="${l}" class="${l===curLevel?'on':''}">${l}<span class="lab">${l==='A1'?'Start':l==='C1'?'Master':'Grow'}</span></button>`).join("");

function openStory(id){ curStory=STORIES.find(s=>s.id===id); renderDetail(); }

function renderDetail(){
  leaveReader(); setActiveNav("library"); setBack(true,"Library",renderLibrary);
  const s=curStory;
  view.innerHTML=`<div class="wrap-read reveal">
      <div class="detail-cover">
        ${cover(s.motif,s.level,ACCENTS[s.level],s.cover)}
        <div class="detail-head"><span class="lvl-tag">Level ${s.level}</span>
          <h1>${esc(s.title)}</h1><div class="by">by ${esc(s.author)}</div>
          <div class="nar">Narrated by the NovaHubs reader</div></div>
      </div>
      <p class="blurb">${esc(s.blurb)}</p>
      <div class="specs">
        <div><div class="k">Level</div><div class="v">${s.level}</div></div>
        <div><div class="k">Reading time</div><div class="v">${readMin(s)} min</div></div>
        <div><div class="k">Words</div><div class="v">${wordCount(s)}</div></div>
        <div><div class="k">Format</div><div class="v">Read &amp; Listen</div></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="readBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 12h16M4 19h11"/></svg>Read this story</button>
        <button class="btn btn-ghost" id="sampleBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l13 7-13 7z"/></svg>Listen to a sample</button>
      </div></div>`;
  $("#readBtn").onclick=()=>renderReader(false);
  $("#sampleBtn").onclick=()=>{ const first=s.body[0].split(/(?<=[.!?])\s+/)[0]; speak(first,1); toast("Playing a sample"); };
  window.scrollTo(0,0);
}

function splitSentences(p){ return (p.match(/[^.!?]+[.!?]*["']?/g)||[p]).map(x=>x.trim()).filter(Boolean); }

function renderReader(asArticle){
  const s = asArticle?curArticle:curStory;
  isArticle=!!asArticle;
  document.body.classList.add("reading-mode");
  document.body.classList.toggle("article-mode", isArticle);
  hideSheet();
  setActiveNav(isArticle?"articles":"library");
  setBack(true, isArticle?"Journal":"Details", isArticle?()=>{openArticle(curArticle.id,true);}:renderDetail);

  let si=0;
  const paras=s.body.map((p,i)=>{
    const inner=splitSentences(p).map(sent=>{
      const words=sent.split(/(\s+)/).map(tok=> /^\s+$/.test(tok)?tok:`<span class="w">${esc(tok)}</span>`).join("");
      return `<span class="s" data-si="${si++}" data-text="${esc(sent)}">${words}</span>`;
    }).join(" ");
    const slot=s.images&&s.images[i];
    const img=!slot?"":Array.isArray(slot)
      ?`<div class="story-fig-row">${slot.map(src=>`<figure class="story-figure story-figure-half"><img src="${esc(src)}" alt="" class="story-img"></figure>`).join("")}</div>`
      :`<figure class="story-figure"><img src="${esc(slot)}" alt="" class="story-img"></figure>`;
    return `<p>${inner}</p>${img}`;
  }).join("")+(s.images&&s.images[s.body.length]&&!Array.isArray(s.images[s.body.length])?`<figure class="story-figure"><img src="${esc(s.images[s.body.length])}" alt="" class="story-img"></figure>`:"");

  const head = isArticle
    ? `<span class="lvl-tag">${esc(s.kicker)} &middot; Journal</span><h1>${esc(s.title)}</h1><div class="by">by ${esc(s.author)}</div>`
    : `<span class="lvl-tag">Chapter One &middot; Level ${s.level}</span><h1>${esc(s.title)}</h1><div class="by">by ${esc(s.author)}</div>`;

  const audioPanel=!isArticle?`<div class="reader-audio reveal" style="animation-delay:120ms">
    <div class="ra-main">
      <button class="ra-play" id="abPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l13 7-13 7z"/></svg>Listen to Story</button>
      <div class="ra-nav">
        <button class="ra-nav-btn" id="abPrev" title="Previous sentence"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h2v14H7zM20 5L10 12l10 7z"/></svg></button>
        <span class="ra-pos" id="abPos">— / —</span>
        <button class="ra-nav-btn" id="abNext" title="Next sentence"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 5h2v14h-2zM4 5l10 7-10 7z"/></svg></button>
      </div>
    </div>
    <div class="speed-strip">
      ${[0.5,0.75,1,1.25,1.5,2].map(r=>`<button class="sp${r===1?' on':''}" data-r="${r}">${r===1?'1':r}&times;</button>`).join('')}
    </div>
  </div>`:'';

  view.innerHTML=`<div class="wrap-read">
      <article>
      <div class="reader-head reveal">${head}</div>
      ${audioPanel}
      <div class="mode-toggle reveal">
        <button data-mode="word" class="${mode==='word'?'on':''}">Tap a word</button>
        <button data-mode="sentence" class="${mode==='sentence'?'on':''}">Tap a sentence</button>
      </div>
      <div class="hint reveal">Tap any <b>word</b> or switch to <b>sentence</b> mode, then choose: listen, slow down, translate to Arabic${isArticle?'':', or save it to your level folder'}.</div>
      <div class="story-body ${mode}-mode reveal" id="storyBody">${paras}</div>
      <div class="endcap">${isArticle?'END OF ARTICLE':'THE END'}</div>
      ${!isArticle?`<div class="done-row">
        <button class="done-btn" id="doneBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Done Reading · Take the Quiz
        </button>
      </div>`:''}
      <div class="dl-pdf-row">
        <button class="dl-pdf" id="dlPdf">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
      </div>
      </article></div>`;

  const body=$("#storyBody");
  view.querySelectorAll(".mode-toggle button").forEach(b=>b.onclick=()=>{
    mode=b.dataset.mode; clearSel(); hideSheet();
    body.classList.toggle("word-mode",mode==="word");
    body.classList.toggle("sentence-mode",mode==="sentence");
    view.querySelectorAll(".mode-toggle button").forEach(x=>x.classList.toggle("on",x.dataset.mode===mode));
  });
  body.onclick=onBodyClick;
  sentenceEls=Array.from(body.querySelectorAll(".s"));
  abRate=1; abIndex=0; abPlaying=false; setPlayIcon(false); updatePos();
  if(!isArticle){
    $("#doneBtn").onclick=()=>startQuiz(qzGenStory(s),"story",s);
    $("#abPlay").onclick=()=>{ abPlaying?stopAudio():playFrom(abIndex); };
    $("#abNext").onclick=()=>{ const w=abPlaying; stopAudio(); abIndex=Math.min(abIndex+1,Math.max(0,sentenceEls.length-1)); updatePos(); hl(abIndex); if(w) playFrom(abIndex); };
    $("#abPrev").onclick=()=>{ const w=abPlaying; stopAudio(); abIndex=Math.max(abIndex-1,0); updatePos(); hl(abIndex); if(w) playFrom(abIndex); };
    view.querySelectorAll(".sp").forEach(b=>b.onclick=()=>{
      abRate=+b.dataset.r;
      view.querySelectorAll(".sp").forEach(x=>x.classList.toggle("on",x===b));
      if(abPlaying){const i=abIndex;stopAudio();playFrom(i);}
    });
  }
  $("#dlPdf").onclick=()=>{
    const orig=document.title;
    document.title=s.title+" — The Story Gazette";
    window.print();
    window.onafterprint=()=>{ document.title=orig; window.onafterprint=null; };
  };
  window.scrollTo(0,0);
}

function onBodyClick(e){
  if(mode==="word"){
    const w=e.target.closest(".w"); if(!w) return;
    clearSel(); w.classList.add("sel"); selText=w.textContent.replace(/[.,;:!?"'()\u201C\u201D]/g,"").trim();
    openSheet(selText,"Selected Word");
  }else{
    const sen=e.target.closest(".s"); if(!sen) return;
    clearSel(); sen.classList.add("sel"); selText=sen.dataset.text;
    openSheet(selText,"Selected Sentence");
  }
}
function clearSel(){ document.querySelectorAll(".sel").forEach(el=>el.classList.remove("sel")); }

/* ---------- selection sheet ---------- */
const sheet=$("#sheet");
function openSheet(text,kicker){
  $("#sheetKicker").textContent=kicker;
  $("#sheetEn").textContent=text;
  const ar=$("#sheetAr"); ar.className="sheet-ar"; ar.textContent="";
  refreshSaveBtn();
  sheet.classList.add("up");
}
function hideSheet(){ sheet.classList.remove("up"); }
$("#sheetClose").onclick=()=>{hideSheet();clearSel();};
$("#actListen").onclick=()=>speak(selText,1);
$("#actSlow").onclick=()=>speak(selText,0.6);
$("#actTranslate").onclick=async()=>{
  const ar=$("#sheetAr"); ar.className="sheet-ar show loading"; ar.textContent="translating to Arabic …";
  const out=await translate(selText);
  ar.className="sheet-ar show"; ar.textContent=out;
};
$("#actSave").onclick=async()=>{
  if(isArticle) return;
  const lvl=curStory.level;
  if(SAVED[lvl].some(x=>x.en===selText && x.storyId===curStory.id)){ toast("Already in your "+lvl+" folder"); return; }
  SAVED[lvl].unshift({en:selText, ar:TR[selText.trim()]||"", story:curStory.title, storyId:curStory.id, ts:Date.now()});
  await saveJSON("nh-saved",SAVED); refreshSaveBtn(); toast("Saved to folder "+lvl);
};
function refreshSaveBtn(){
  if(isArticle) return;
  const lvl=curStory?curStory.level:null;
  const ex=lvl && SAVED[lvl].some(x=>x.en===selText && x.storyId===curStory.id);
  const btn=$("#actSave"); btn.classList.toggle("saved",!!ex); btn.lastChild.textContent=ex?"Saved":"Save";
}

/* ---------- audio ---------- */
function setPlayIcon(p){
  const btn=$("#abPlay");if(!btn)return;
  btn.innerHTML=p
    ?`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>Stop`
    :`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l13 7-13 7z"/></svg>Listen to Story`;
}
function updatePos(){ const el=$("#abPos");if(el)el.textContent=(sentenceEls.length?(abIndex+1):0)+" / "+sentenceEls.length; }
function hl(i){ document.querySelectorAll(".reading").forEach(e=>e.classList.remove("reading"));
  const el=sentenceEls[i]; if(el){ el.classList.add("reading"); el.scrollIntoView({behavior:"smooth",block:"center"}); } }
function playFrom(i){
  if(i>=sentenceEls.length){ stopAudio(); abIndex=0; updatePos(); return; }
  abIndex=i; abPlaying=true; setPlayIcon(true); updatePos(); hl(i);
  speak(sentenceEls[i].dataset.text, abRate, ()=>{ if(abPlaying) playFrom(i+1); });
}
function stopAudio(){ abPlaying=false; if("speechSynthesis" in window) speechSynthesis.cancel(); setPlayIcon(false);
  document.querySelectorAll(".reading").forEach(e=>e.classList.remove("reading")); }

            <button class="ct del" data-i="${i}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M9 7V4h6v3M7 7l1 13h8l1-13"/></svg></button>
          </span></div>
      </div>`).join("")+`</div>`;
  }
  view.innerHTML=`<div class="wrap">
      <div class="sec-head"><div class="sec-kicker">Your Saved Sentences</div>
        <h1 class="sec-title">The Memory Folders</h1>
        <div class="sec-sub">Every sentence you keep is filed by its level, and remembers the tale it came from.</div></div>
