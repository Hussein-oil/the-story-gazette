  {id:'tc-p1',cat:'comp',level:'Pro',motif:'lighthouse',title:'The Invisible Infrastructure',author:'NovaHubs Tech',

     "For most of computing history, running an application meant owning a physical server — a machine in a room, consuming power, requiring maintenance, and sitting idle during quiet hours. Cloud computing eliminated this constraint. Today, you rent precisely the computing power, storage, and services you need from providers such as AWS, Google Cloud, or Azure, and pay only for what you consume.",

/* ---------- storage (artifact storage if present, else localStorage, else memory) ---------- */
const hasArtifactStore = (typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");
function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
const mem={};
async function loadJSON(key, fallback){
  if(hasArtifactStore){ try{ const r=await window.storage.get(key,false); return r&&r.value?JSON.parse(r.value):fallback; }catch(e){ return fallback; } }
  const v=lsGet(key); if(v){ try{return JSON.parse(v);}catch(e){} }
  return (key in mem)?mem[key]:fallback;
}
async function saveJSON(key, obj){
  const s=JSON.stringify(obj); mem[key]=obj;
  if(hasArtifactStore){ try{ await window.storage.set(key,s,false); }catch(e){} }
  lsSet(key,s);
}

/* ---------- text to speech ---------- */
let VOICE=null;
let VOICE_GENDER_MATCHED=false;
let _vpRetries=0;
let voicePref=(()=>{ try{ return JSON.parse(localStorage.getItem('nh-voice-pref'))||{accent:'GB',gender:'F'}; }catch(e){ return {accent:'GB',gender:'F'}; } })();
/* common voice-name hints per gender across Windows/macOS/Android/iOS voice packs */
const _VOICE_F=/female|zira|hazel|susan|libby|sonia|aria|jenny|jessa|samantha|victoria|karen|serena|moira|tessa|fiona|kate|emma|ava|allison|stephanie|catherine/i;
const _VOICE_M=/male|david|mark|george|ryan|guy|daniel|james|alex\b|fred|oliver|thomas|arthur|brian|christopher|eric/i;
function pickVoice(){
  if(!("speechSynthesis" in window)) return;
  const vs=speechSynthesis.getVoices();
  if(!vs.length){ if(_vpRetries++<8) setTimeout(pickVoice,300); return; }
  _vpRetries=0;
  const re=voicePref.accent==='US'?/en[-_]US/i:/en[-_]GB/i;
  const fb=voicePref.accent==='US'?/en[-_]GB/i:/en[-_]US/i;
  const isF=v=>_VOICE_F.test(v.name);
  const matchGender=voicePref.gender==='M'?(v=>!isF(v)&&_VOICE_M.test(v.name)):isF;
  const pools=[vs.filter(v=>re.test(v.lang)),vs.filter(v=>fb.test(v.lang)),vs.filter(v=>/^en/i.test(v.lang)),vs];
  VOICE=null; VOICE_GENDER_MATCHED=false;
  for(const p of pools){ const g=p.find(matchGender); if(g){ VOICE=g; VOICE_GENDER_MATCHED=true; break; } }
  if(!VOICE) for(const p of pools){ if(p.length){ VOICE=p[0]; break; } }
}
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged=()=>{ _vpRetries=0; pickVoice(); }; }
function speak(text, rate, onend){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const fv=VOICE?(speechSynthesis.getVoices().find(v=>v.name===VOICE.name)||VOICE):null;
  if(fv){ u.voice=fv; u.lang=fv.lang; }
  else { u.lang=voicePref.accent==='US'?'en-US':'en-GB'; }
  u.rate=rate;
  /* pitch shift only as a fallback when no genuinely gendered voice was found */
  u.pitch=VOICE_GENDER_MATCHED?1:(voicePref.gender==='M'?0.75:1.2);
  if(onend) u.onend=onend;
  speechSynthesis.speak(u);
}

/* ---------- translation (free public APIs, works in any browser) ---------- */
/* cap the cache so localStorage never fills up; oldest entries are evicted first */
const TR_MAX=800;
function rememberTR(key,out){
  TR[key]=out;
  const keys=Object.keys(TR);
  if(keys.length>TR_MAX) keys.slice(0,keys.length-TR_MAX).forEach(k=>delete TR[k]);
  saveJSON("nh-tr",TR);
}
async function translate(text){
  const tl=nativeLang.code;
  const key=text.trim()+"||"+tl;
  if(TR[key]) return TR[key];
  // 1) Google public endpoint
  try{
    const r=await fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl="+encodeURIComponent(tl)+"&dt=t&q="+encodeURIComponent(text.trim()));
    if(r.ok){ const d=await r.json(); const out=(d[0]||[]).map(s=>s[0]).join("").trim();
      if(out){ rememberTR(key,out); return out; } }
  }catch(e){}
  // 2) MyMemory fallback
  try{
    const r=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text.trim())+"&langpair=en|"+encodeURIComponent(tl));
    if(r.ok){ const d=await r.json(); const out=(d.responseData&&d.responseData.translatedText||"").trim();
      if(out){ rememberTR(key,out); return out; } }
  }catch(e){}
  return null;
}

/* shared modal a11y helpers: focus trap + optional Escape-to-close */
function trapModal(ov, onEscape){
  ov.addEventListener("keydown",e=>{
    if(e.key==="Escape"&&onEscape){ e.preventDefault(); onEscape(); return; }
    if(e.key!=="Tab") return;
    const focusables=ov.querySelectorAll('button:not(:disabled),[href],input,select,textarea,[tabindex]:not([tabindex="-1"])');
    if(!focusables.length) return;
    const first=focusables[0], last=focusables[focusables.length-1];
    if(e.shiftKey&&document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault(); first.focus(); }
  });
}

let UI_TR={};
function t(s){ return (siteLang&&siteLang.code!=='en'&&UI_TR[s]!==undefined)?UI_TR[s]:s; }
async function translateUIRaw(text,code){
  try{
    const r=await fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl="+encodeURIComponent(code)+"&dt=t&q="+encodeURIComponent(text));
    const d=await r.json(); return d[0]?.map(x=>x[0]).join('')||text;
  }catch(e){
    try{
      const r2=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=en|"+encodeURIComponent(code));
      const d2=await r2.json(); if(d2.responseStatus===200) return d2.responseData.translatedText||text;
    }catch(e2){}
    return text;
  }
}
async function translateUIStrings(){
  if(!siteLang||siteLang.code==='en'){ UI_TR={}; return; }
  const code=siteLang.code;
  try{ const c=localStorage.getItem('nh-ui-tr-'+code); if(c) UI_TR=JSON.parse(c)||{}; }catch(e){ UI_TR={}; }
  const missing=UI_KEYS.filter(k=>!(k in UI_TR));
  if(!missing.length) return;
  /* batch keys newline-joined into a handful of requests instead of one request per key;
     fall back to per-key requests for a chunk whose line count comes back mangled */
  const CHUNK=25;
  for(let i=0;i<missing.length;i+=CHUNK){
    const chunk=missing.slice(i,i+CHUNK);
    const res=await translateUIRaw(chunk.join("\n"),code);
    const lines=res.split("\n");
    if(lines.length===chunk.length){ chunk.forEach((k,j)=>{ UI_TR[k]=lines[j].trim()||k; }); }
    else {
      const seq=await Promise.all(chunk.map(k=>translateUIRaw(k,code)));
      chunk.forEach((k,j)=>{ UI_TR[k]=seq[j]; });
    }
  }
  try{ localStorage.setItem('nh-ui-tr-'+code,JSON.stringify(UI_TR)); }catch(e){}
}
function applyUITranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.dataset.i18n); });
}

  // audio
  $('#abPlay').onclick=()=>{ abPlaying?stopAudio():playFrom(abIndex); };
  $('#abNext').onclick=()=>{ const w=abPlaying;stopAudio();abIndex=Math.min(abIndex+1,sentenceEls.length-1);updatePos();hl(abIndex);if(w)playFrom(abIndex); };
  $('#abPrev').onclick=()=>{ const w=abPlaying;stopAudio();abIndex=Math.max(abIndex-1,0);updatePos();hl(abIndex);if(w)playFrom(abIndex); };
  view.querySelectorAll('.sp[data-r]').forEach(b=>b.onclick=()=>{ abRate=+b.dataset.r; view.querySelectorAll('.sp[data-r]').forEach(x=>x.classList.toggle('on',x===b)); if(abPlaying){const i=abIndex;stopAudio();playFrom(i);} });

  $('#tcUS').onclick=()=>setTVP('accent','US'); $('#tcGB').onclick=()=>setTVP('accent','GB');
  $('#tcM').onclick=()=>setTVP('gender','M');  $('#tcF').onclick=()=>setTVP('gender','F');

function renderLibrary(){
  leaveReader(); setActiveNav("library"); setBack(false);
  const stories=STORIES.filter(s=>s.level===curLevel);
  const tabs=LEVELS.map(l=>`<button data-level="${l}" class="${l===curLevel?'on':''}">${l}<span class="lab">${l==='A1'?t('Start'):l==='C1'?t('Master'):t('Grow')}</span></button>`).join("");

    <div class="card reveal" data-story="${s.id}" style="animation-delay:${i*50}ms" role="button" tabindex="0" aria-label="${esc(s.title)} — ${s.level}, ${readMin(s)} min read">
      ${cover(s.motif,s.level,ACCENTS[s.level])}

          <span class="save-hint-arrow">→</span>
          <span class="save-hint-step"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>${t('Export Progress')}</span>

function splitSentences(p){ return (p.match(/[^.!?]+[.!?]*["']?/g)||[p]).map(x=>x.trim()).filter(Boolean); }

function renderReader(){
  const s = curStory;
  document.body.classList.add("reading-mode");
  hideSheet();
  setActiveNav("library");
  setBack(true, "Details", renderDetail);

  let si=0;
  const dim=s.imgSize?` width="${s.imgSize[0]}" height="${s.imgSize[1]}"`:"";
  const fig=src=>`<figure class="story-figure"><img src="${esc(src)}" alt="${esc("Illustration from "+s.title)}" class="story-img" loading="lazy" decoding="async"${dim}></figure>`;
  const paras=s.body.map((p,i)=>{
    const inner=splitSentences(p).map(sent=>{
      const words=sent.split(/(\s+)/).map(tok=> /^\s+$/.test(tok)?tok:`<span class="w">${esc(tok)}</span>`).join("");
      return `<span class="s" data-si="${si++}" data-text="${esc(sent)}" tabindex="0">${words}</span>`;
    }).join(" ");
    const slot=s.images&&s.images[i];
    const img=!slot?"":Array.isArray(slot)
      ?`<div class="story-fig-row">${slot.map(fig).join("")}</div>`
      :fig(slot);
    return `<p>${inner}</p>${img}`;
  }).join("")+(s.images&&s.images[s.body.length]&&!Array.isArray(s.images[s.body.length])?fig(s.images[s.body.length]):"");

  const head = `<span class="lvl-tag">Chapter One &middot; Level ${s.level}</span><h1>${esc(s.title)}</h1><div class="by">by ${esc(s.author)}</div>`;

  const audioPanel=`<div class="reader-audio reveal" style="animation-delay:120ms">
    <div class="ra-main">
      <button class="ra-play" id="abPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l13 7-13 7z"/></svg>${t('Listen to Story')}</button>
      <div class="ra-nav">
        <button class="ra-nav-btn" id="abPrev" title="Previous sentence"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h2v14H7zM20 5L10 12l10 7z"/></svg></button>
        <span class="ra-pos" id="abPos">— / —</span>
        <button class="ra-nav-btn" id="abNext" title="Next sentence"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 5h2v14h-2zM4 5l10 7-10 7z"/></svg></button>
      </div>
    </div>
    <div class="speed-strip">
      ${[0.5,0.75,1,1.25,1.5,2].map(r=>`<button class="sp${r===1?' on':''}" data-r="${r}">${r===1?'1':r}&times;</button>`).join('')}
    </div>
    <div class="voice-row-r">
      <span class="vl">Accent</span>
      <div class="vs-g">
        <button class="sp${voicePref.accent==='US'?' on':''}" id="vcUS">US</button>
        <button class="sp${voicePref.accent==='GB'?' on':''}" id="vcGB">GB</button>
      </div>
      <span class="vl">Voice</span>
      <div class="vs-g">
        <button class="sp${voicePref.gender==='M'?' on':''}" id="vcM">Male</button>
        <button class="sp${voicePref.gender==='F'?' on':''}" id="vcF">Female</button>
      </div>
    </div>
  </div>`;

  view.innerHTML=`<div class="wrap-read">
      <article>
      <div class="reader-head reveal">${head}</div>
      ${audioPanel}
      <div class="mode-toggle reveal">
        <button data-mode="word" class="${mode==='word'?'on':''}">${t('Tap a word')}</button>
        <button data-mode="sentence" class="${mode==='sentence'?'on':''}">${t('Tap a sentence')}</button>
      </div>
      <div class="hint reveal">${siteLang.code==='en'?'Tap any <b>word</b> or switch to <b>sentence</b> mode, then choose: listen, slow down, translate, or save it to your level folder.':esc(t('Tap any word or switch to sentence mode, then choose: listen, slow down, translate, or save it to your level folder.'))}</div>
      <div class="story-body ${mode}-mode reveal" id="storyBody">${paras}</div>
      <div class="endcap">${esc(t('THE END'))}</div>
      <div class="done-row">
        <button class="done-btn" id="doneBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          ${t('Done Reading · Take the Quiz')}
        </button>
      </div>
      <div class="dl-pdf-row">
        <button class="dl-pdf" id="dlPdf">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
      </div>
      </article></div>`;

  const body=$("#storyBody");
  view.querySelectorAll(".mode-toggle button").forEach(b=>b.onclick=()=>{
    mode=b.dataset.mode; clearSel(); hideSheet();
    body.classList.toggle("word-mode",mode==="word");
    body.classList.toggle("sentence-mode",mode==="sentence");
    view.querySelectorAll(".mode-toggle button").forEach(x=>x.classList.toggle("on",x.dataset.mode===mode));
  });
  body.onclick=onBodyClick;
  body.onkeydown=onBodyKeydown;
  sentenceEls=Array.from(body.querySelectorAll(".s"));
  abRate=1; abIndex=0; abPlaying=false; setPlayIcon(false); updatePos();
  $("#doneBtn").onclick=()=>startQuiz(qzGenStory(s),"story",s);
  $("#abPlay").onclick=()=>{ abPlaying?stopAudio():playFrom(abIndex); };
  $("#abNext").onclick=()=>{ const w=abPlaying; stopAudio(); abIndex=Math.min(abIndex+1,Math.max(0,sentenceEls.length-1)); updatePos(); hl(abIndex); if(w) playFrom(abIndex); };
  $("#abPrev").onclick=()=>{ const w=abPlaying; stopAudio(); abIndex=Math.max(abIndex-1,0); updatePos(); hl(abIndex); if(w) playFrom(abIndex); };
  view.querySelectorAll(".sp[data-r]").forEach(b=>b.onclick=()=>{
    abRate=+b.dataset.r;
    view.querySelectorAll(".sp[data-r]").forEach(x=>x.classList.toggle("on",x===b));
    if(abPlaying){const i=abIndex;stopAudio();playFrom(i);}
  });
  function setVP(key,val){
    voicePref[key]=val;
    localStorage.setItem('nh-voice-pref',JSON.stringify(voicePref));
    pickVoice();
    view.querySelectorAll("#vcUS,#vcGB").forEach(b=>b.classList.toggle('on',(b.id==='vcUS'&&voicePref.accent==='US')||(b.id==='vcGB'&&voicePref.accent==='GB')));
    view.querySelectorAll("#vcM,#vcF").forEach(b=>b.classList.toggle('on',(b.id==='vcM'&&voicePref.gender==='M')||(b.id==='vcF'&&voicePref.gender==='F')));
    if(abPlaying){const i=abIndex;stopAudio();playFrom(i);}
  }
  $("#vcUS").onclick=()=>setVP('accent','US');
  $("#vcGB").onclick=()=>setVP('accent','GB');
  $("#vcM").onclick=()=>setVP('gender','M');
  $("#vcF").onclick=()=>setVP('gender','F');
  $("#dlPdf").onclick=()=>{
    const orig=document.title;
    document.title=s.title+" — NovaHubs";
    window.print();
    window.onafterprint=()=>{ document.title=orig; window.onafterprint=null; };
  };
  window.scrollTo(0,0);
}

function onBodyClick(e){
  if(mode==="word"){
    const w=e.target.closest(".w"); if(!w) return;
    clearSel(); w.classList.add("sel"); selText=w.textContent.replace(/[.,;:!?"'()\u201C\u201D]/g,"").trim();
    openSheet(selText,t("Selected Word"));
  }else{
    const sen=e.target.closest(".s"); if(!sen) return;
    clearSel(); sen.classList.add("sel"); selText=sen.dataset.text;
    openSheet(selText,t("Selected Sentence"));
  }
}
/* keyboard: Enter/Space on a focused sentence selects it (in any mode) */
function onBodyKeydown(e){
  if(e.key!=="Enter"&&e.key!==" ") return;
  const sen=e.target.closest(".s"); if(!sen) return;
  e.preventDefault();
  clearSel(); sen.classList.add("sel"); selText=sen.dataset.text;
  openSheet(selText,t("Selected Sentence"));
}
function clearSel(){ document.querySelectorAll(".sel").forEach(el=>el.classList.remove("sel")); }

/* ---------- selection sheet ---------- */
const sheet=$("#sheet");
function openSheet(text,kicker){
  $("#sheetKicker").textContent=kicker;
  $("#sheetEn").textContent=text;
  const ar=$("#sheetAr"); ar.className="sheet-ar"; ar.textContent="";
  refreshSaveBtn();
  sheet.classList.add("up");
}
function hideSheet(){ sheet.classList.remove("up"); }
$("#sheetClose").onclick=()=>{hideSheet();clearSel();};
/* keyboard activation for div-based buttons, and Escape to close the sheet */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&sheet.classList.contains("up")){ hideSheet(); clearSel(); return; }
  if(e.key!=="Enter"&&e.key!==" ") return;
  const el=e.target;
  if(el instanceof Element && el.matches('[role="button"]') && el.tagName!=="BUTTON" && el.tagName!=="A"){
    e.preventDefault(); el.click();
  }
});
/* stop any running story narration first so its onend chain cannot resume over the selection */
$("#actListen").onclick=()=>{ stopAudio(); speak(selText,1); };
$("#actSlow").onclick=()=>{ stopAudio(); speak(selText,0.6); };
$("#actTranslate").onclick=async()=>{
  const ar=$("#sheetAr");
  ar.className="sheet-ar show loading";
  ar.textContent=t("translating to")+" "+nativeLang.name+" …";
  ar.style.direction=nativeLang.rtl?"rtl":"ltr";
  ar.style.textAlign=nativeLang.rtl?"right":"left";
  const requested=selText;
  const out=await translate(requested);
  if(requested!==selText) return; /* selection changed while we were waiting */
  if(out){ ar.className="sheet-ar show"; ar.textContent=out; }
  else {
    ar.className="sheet-ar show loading";
    ar.style.direction="ltr"; ar.style.textAlign="left";
    ar.textContent=t("Translation unavailable — check your connection and tap Translate to retry.");
  }
};
$("#actSave").onclick=async()=>{
  const story=curStory||curTechStory;
  if(!story) return;
  const lvl=(!curStory&&curTechStory)?'tech':curStory.level;
  if(SAVED[lvl].some(x=>x.en===selText && x.storyId===story.id)){ toast("Already in your "+lvl+" folder"); return; }
  SAVED[lvl].unshift({en:selText, ar:TR[selText.trim()]||"", story:story.title, storyId:story.id, ts:Date.now()});
  await saveJSON("nh-saved",SAVED); refreshSaveBtn(); toast("Saved to "+lvl+" folder");
};
function refreshSaveBtn(){
  const story=curStory||curTechStory;
  const lvl=(!curStory&&curTechStory)?'tech':(story?story.level:null);
  const ex=lvl && story && SAVED[lvl] && SAVED[lvl].some(x=>x.en===selText && x.storyId===story.id);
  const btn=$("#actSave"); btn.classList.toggle("saved",!!ex); btn.lastChild.textContent=ex?t("Saved"):t("Save");
}

/* ---------- audio ---------- */
function setPlayIcon(p){
  const btn=$("#abPlay");if(!btn)return;
  btn.innerHTML=p
    ?`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>${esc(t('Stop'))}`
    :`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l13 7-13 7z"/></svg>${esc(t('Listen to Story'))}`;
}
function updatePos(){ const el=$("#abPos");if(el)el.textContent=(sentenceEls.length?(abIndex+1):0)+" / "+sentenceEls.length; }
function hl(i){ document.querySelectorAll(".reading").forEach(e=>e.classList.remove("reading"));
  const el=sentenceEls[i]; if(el){ el.classList.add("reading"); el.scrollIntoView({behavior:"smooth",block:"center"}); } }
function playFrom(i){
  if(i>=sentenceEls.length){ stopAudio(); abIndex=0; updatePos(); return; }
  abIndex=i; abPlaying=true; setPlayIcon(true); updatePos(); hl(i);
  speak(sentenceEls[i].dataset.text, abRate, ()=>{ if(abPlaying) playFrom(i+1); });
}
function stopAudio(){ abPlaying=false; if("speechSynthesis" in window) speechSynthesis.cancel(); setPlayIcon(false);
  document.querySelectorAll(".reading").forEach(e=>e.classList.remove("reading")); }

/* ---------- folders ---------- */
const _FC={A1:'#5b7d4f',A2:'#3f6b8a',B1:'#a63422',B2:'#8a5a1f',C1:'#5a3a6b',tech:'#2e7a8a'};

/* ---------- quiz ---------- */
const QZ_STOP=new Set("a an the is are was were be been being have has had do does did will would could should may might shall must can i he she it we you they and or but in on at to of for with by from up out this that his her its our their him us them what who one two three then now said goes come went back each some all there here just very only still soon again already also even if though while as after before".split(" "));
function qzNorm(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();}
function qzLev(a,b){
  if(!a.length)return b.length;if(!b.length)return a.length;
  const m=[];for(let i=0;i<=b.length;i++)m[i]=[i];for(let j=1;j<=a.length;j++)m[0][j]=j;
  for(let i=1;i<=b.length;i++)for(let j=1;j<=a.length;j++)
    m[i][j]=b[i-1]===a[j-1]?m[i-1][j-1]:1+Math.min(m[i-1][j],m[i][j-1],m[i-1][j-1]);
  return m[b.length][a.length];
}
function qzMatch(user,correct){
  const u=qzNorm(user),c=qzNorm(correct);
  if(!u)return false;
  return u===c||qzLev(u,c)<=Math.max(1,Math.floor(c.length*.2));
}
function qzMakeFill(sentence){
  const clean=sentence.replace(/[.!?]$/,"");
  const words=clean.split(/\s+/);
  const cands=words.map((w,i)=>[w,i]).filter(([w])=>{
    const cl=w.toLowerCase().replace(/[^a-z]/g,"");
    return cl.length>3&&!QZ_STOP.has(cl);
  });
  if(!cands.length)return null;
  const [word,idx]=cands[Math.floor(Math.random()*cands.length)];
  const ans=word.replace(/[.,!?;:'"]/g,"");
  const display=words.map((w,i)=>i===idx?`<span class="qz-blank">___</span>`:esc(w)).join(" ");
  return{type:"fill",sentence,display,answer:ans.toLowerCase()};
}
function qzGenStory(story){
  const sents=story.body.flatMap(p=>splitSentences(p)).filter(s=>s.split(/\s+/).length>=5);
  const pool=[...sents].sort(()=>Math.random()-.5);
  const qs=[];
  for(const s of pool){if(qs.filter(q=>q.type==="fill").length>=3)break;const q=qzMakeFill(s);if(q)qs.push(q);}
  const used=new Set(qs.map(q=>q.sentence));
  pool.filter(s=>!used.has(s)).slice(0,2).forEach(s=>qs.push({type:"dictation",text:s}));
  SAVED[story.level].filter(x=>x.storyId===story.id&&x.ar).slice(0,3).forEach(it=>qs.push({type:"write",prompt:it.ar,answer:it.en}));
  return qs.sort(()=>Math.random()-.5);
}
function qzGenReview(level){
  const items=[...SAVED[level]].sort(()=>Math.random()-.5).slice(0,12);
  return items.map((it,i)=>{
    if(i%3===0){const q=qzMakeFill(it.en);if(q)return q;}
    if(i%3===1&&it.ar)return{type:"write",prompt:it.ar,answer:it.en};
    return{type:"dictation",text:it.en};
  }).filter(Boolean);
}
let qzQ=[],qzIdx=0,qzScore=0,qzSrc="",qzStory=null,qzLog=[],qzReviewLevel=null;
function startQuiz(questions,src,story){
  if(!questions||!questions.length){toast(t("No items yet — read more stories and save words first!"));return;}
  qzQ=questions;qzIdx=0;qzScore=0;qzSrc=src;qzStory=story||null;qzLog=[];
  leaveReader();
  setActiveNav(src==="review"?"saved":"library");
  setBack(true,src==="review"?"Folders":"Story",src==="review"?renderSaved:renderDetail);
  qzShowQ();
}
function qzShowQ(){
  const q=qzQ[qzIdx],total=qzQ.length,pct=Math.round((qzIdx/total)*100);
  const typeLabel={fill:t("Fill in the Blank"),dictation:t("Dictation — Listen & Write"),write:t("Write in English")}[q.type];
  let inner="";
  if(q.type==="fill"){
    inner=`<div class="qz-type-tag">${typeLabel}</div>
      <div class="qz-q">${q.display}</div>
      <input class="qz-input" id="qzIn" type="text" placeholder="${t('Type the missing word…')}" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="qz-btns"><button class="btn btn-primary" id="qzCheck">${t('Check')}</button><button class="qz-skip" id="qzSkip">${t('Skip')}</button></div>`;
  }else if(q.type==="write"){
    inner=`<div class="qz-type-tag">${typeLabel}</div>
      <div class="qz-ar">${esc(q.prompt)}</div>
      <input class="qz-input" id="qzIn" type="text" placeholder="${t('Type in English…')}" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="qz-btns"><button class="btn btn-primary" id="qzCheck">${t('Check')}</button><button class="qz-skip" id="qzSkip">${t('Skip')}</button></div>`;
  }else{
    inner=`<div class="qz-type-tag">${typeLabel}</div>
      <div class="qz-dict-hint">${t('Press Play to hear the sentence, then type exactly what you heard.')}</div>
      <div class="qz-btns" id="qzPlayRow">
        <button class="qz-mic" id="qzPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l13 7-13 7z"/></svg>${t('Play Sentence')}</button>
      </div>
      <input class="qz-input" id="qzIn" type="text" placeholder="${t('Type what you heard…')}" autocomplete="off" autocorrect="off" spellcheck="false" disabled style="opacity:.45">
      <div class="qz-btns" id="qzCheckRow" style="display:none">
        <button class="btn btn-primary" id="qzCheck">${t('Check')}</button>
        <button class="qz-skip" id="qzSkip">${t('Skip')}</button>
      </div>`;
  }
  view.innerHTML=`<div class="quiz-wrap">
    <div class="quiz-head reveal">
      <div class="quiz-kicker">${esc(qzSrc==="review"?t("Vocabulary Review"):t("Story Quiz"))}${qzStory?` · ${esc(qzStory.title)}`:""}</div>
      <div class="qz-bar-wrap"><div class="qz-bar-fill" style="width:${pct}%"></div></div>
      <div class="quiz-count">${t('Question')} ${qzIdx+1} ${t('of')} ${total}</div>
    </div>
    <div class="quiz-card reveal" style="animation-delay:80ms">
      ${inner}
      <div class="qz-feedback" id="qzFb"></div>
    </div></div>`;
  const inp=$("#qzIn");
  if(inp&&q.type!=="dictation")inp.focus();
  const doCheck=()=>{
    if(!inp||inp.disabled)return;
    const val=inp.value.trim();
    inp.disabled=true;
    const ck=$("#qzCheck");if(ck)ck.style.display="none";
    const fb=$("#qzFb");
    if(q.type==="dictation"){
      const res=qzWordAlign(val,q.text);
      const matched=res.filter(r=>r.ok).length,ttl=res.length;
      const ok=ttl>0&&matched/ttl>=.75;
      qzScore+=ok?1:0;qzLog.push({q,val,ok});
      const wordHtml=res.map(r=>
        r.ok&&!r.close?`<span class="qw-ok">${esc(r.word)}</span>`:
        r.ok&&r.close?`<span class="qw-close">${esc(r.word)}</span>`:
        `<span class="qw-miss">${esc(r.word)}</span>`
      ).join(" ");
      fb.className="qz-feedback "+(ok?"ok":"err");
      fb.innerHTML=`<div class="qz-word-result">${wordHtml}</div><div class="qz-spoken-line">${matched}/${ttl} words correct${ok?" — well done!":"."}</div>`;
    }else{
      const ok=qzMatch(val,q.answer);
      qzScore+=ok?1:0;qzLog.push({q,val,ok});
      inp.classList.add(ok?"ok":"err");
      fb.className="qz-feedback "+(ok?"ok":"err");
      fb.innerHTML=ok?"✓ Correct!":`✗ Answer: <strong>${esc(q.answer)}</strong>`;
    }
    qzNextBtn();
  };
  const ck=$("#qzCheck");if(ck)ck.onclick=doCheck;
  if(inp)inp.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();doCheck();}};
  const playBtn=$("#qzPlay");
  if(playBtn){
    let played=false;
    playBtn.onclick=()=>{
      speak(q.text,.9);
      if(!played){
        played=true;
        playBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l13 7-13 7z"/></svg>${t('Play Again')}`;
        if(inp){inp.disabled=false;inp.style.opacity="1";inp.focus();}
        const cr=$("#qzCheckRow");if(cr)cr.style.display="";
      }
    };
  }
  const skip=$("#qzSkip");
  if(skip)skip.onclick=()=>{qzLog.push({q,val:"",ok:false});qzAdvance();};
}
function qzWordAlign(spoken,target){
  const sw=qzNorm(spoken).split(/\s+/).filter(Boolean);
  const tw=qzNorm(target).split(/\s+/).filter(Boolean);
  const used=new Set();
  return tw.map(t=>{
    let bestD=Infinity,bestI=-1;
    sw.forEach((s,i)=>{if(!used.has(i)){const d=qzLev(s,t);if(d<bestD){bestD=d;bestI=i;}}});
    const thr=Math.max(1,Math.floor(t.length*.3));
    if(bestI>=0&&bestD<=thr){used.add(bestI);return{word:t,ok:true,close:bestD>0};}
    return{word:t,ok:false};
  });
}
function qzNextBtn(){
  const btns=view.querySelector(".qz-btns");if(!btns)return;
  const b=document.createElement("button");
  b.className="btn btn-ghost";
  b.textContent=qzIdx+1<qzQ.length?t("Next →"):t("See Results");
  b.onclick=qzAdvance;btns.appendChild(b);
  const sk=$("#qzSkip");if(sk)sk.style.display="none";
}
function qzAdvance(){qzIdx++;if(qzIdx>=qzQ.length)qzResult();else qzShowQ();}
function qzResult(){
  const total=qzQ.length,pct=Math.round((qzScore/total)*100);
  const msg=pct>=80?t("Excellent!"):pct>=60?t("Well done!"):pct>=40?t("Good effort!"):t("Keep practising!");
  const rows=qzLog.map((a,i)=>`<div class="qr-row"><span>${i+1}. ${esc((a.q.answer||a.q.text||"").slice(0,48))}</span><span class="${a.ok?"qr-ok":"qr-no"}">${a.ok?"✓":"✗"}</span></div>`).join("");
  const story=qzStory;
  if(story && qzSrc!=="review"){ DONE.add(story.id); saveJSON("nh-done",[...DONE]); }
  view.innerHTML=`<div class="quiz-wrap">
    <div class="qz-results reveal">
      <div class="qr-ring">${qzScore}/${total}</div>
      <div class="qr-label">${msg}</div>
      <div class="qr-sub">${qzScore} ${t('of')} ${total} · ${pct}%</div>
      <div class="qr-list">${rows}</div>
      <div class="btn-row">
        ${story?`<button class="btn btn-primary" id="qrBack">${t('Back to Story')}</button>`:`<button class="btn btn-primary" id="qrFolders">${t('Back to Folders')}</button>`}
        <button class="btn btn-ghost" id="qrAgain">${t('Try Again')}</button>
      </div>
    </div></div>`;
  if($("#qrBack"))$("#qrBack").onclick=renderDetail;
  if($("#qrFolders"))$("#qrFolders").onclick=renderSaved;
  $("#qrAgain").onclick=()=>startQuiz(qzSrc==="review"?qzGenReview(qzReviewLevel||curLevel):qzGenStory(story),qzSrc,story);
  window.scrollTo(0,0);
}

/* ---------- export / import ---------- */
function exportProgress(){
  const data={version:1,exported:new Date().toISOString(),saved:SAVED,done:[...DONE],tr:TR};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="novahubs-progress-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(t("Progress exported!"));
}
async function importProgress(file){
  if(!file) return;
  const text=await file.text().catch(()=>null);
  if(!text){ toast(t("Could not read file")); return; }
  let data;
  try{ data=JSON.parse(text); }catch(e){ toast(t("Invalid file")); return; }
  if(!data.version||!data.saved){ toast(t("Invalid file")); return; }
  if(Array.isArray(data.done)){ data.done.forEach(id=>{ if(typeof id==="string") DONE.add(id); }); await saveJSON("nh-done",[...DONE]); }
  if(data.saved){
    [...LEVELS,'tech'].forEach(l=>{
      if(!Array.isArray(data.saved[l])) return;
      if(!SAVED[l]) SAVED[l]=[];
      const seen=new Set(SAVED[l].map(x=>x.en+"||"+x.storyId));
      data.saved[l].forEach(it=>{
        if(!it||typeof it.en!=="string"||typeof it.storyId!=="string") return;
        const item={en:it.en, ar:typeof it.ar==="string"?it.ar:"", story:typeof it.story==="string"?it.story:"", storyId:it.storyId, ts:typeof it.ts==="number"?it.ts:Date.now()};
        if(!seen.has(item.en+"||"+item.storyId)){ SAVED[l].push(item); seen.add(item.en+"||"+item.storyId); }
      });
    });
    await saveJSON("nh-saved",SAVED);
  }
  if(data.tr && typeof data.tr==="object"){
    Object.entries(data.tr).forEach(([k,v])=>{ if(typeof v==="string") TR[k]=v; });
    await saveJSON("nh-tr",TR);
  }
  renderSaved();
  toast(t("Progress restored!"));
}

/* ---------- settings ---------- */
function renderSettings(){

  let rawStats={}; try{ rawStats=JSON.parse(localStorage.getItem("nh-stats")||"{}")||{}; }catch(e){}
  const dayMap=rawStats.days||{};
  const chartDays=[];
  let activeDays=0, totalSecs=0;
  for(let i=6;i>=0;i--){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const secs=dayMap[key]||0;
    chartDays.push({mins:Math.round(secs/60), label:d.toLocaleDateString("en",{weekday:"short"})});
    if(secs>0) activeDays++;
    totalSecs+=secs;
  }
  const totalMins=Math.round(totalSecs/60);
  const avgMins=activeDays>0?Math.round(totalMins/activeDays):0;
  const totalSaved=LEVELS.reduce((n,l)=>n+SAVED[l].length,0);

    let s=`M${p[0][0].toFixed(1)},${p[0][1].toFixed(1)}`;

    return s;
  }
  const cp=bez(pts);
  const fp=cp+` L${pts[pts.length-1][0].toFixed(1)},${H-PY} L${pts[0][0].toFixed(1)},${H-PY} Z`;
  const dots=pts.map(([x,y],i)=>`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="var(--accent)" opacity=".9"><title>${chartDays[i].mins} min</title></circle>`).join("");

  const MOON='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  view.innerHTML=`<div class="settings-wrap reveal">
    <div class="sec-head" style="margin-bottom:28px">
      <div class="sec-kicker">${t("Your Account")}</div>
      <h1 class="sec-title">${t("Settings")}</h1>
    </div>
    <div class="settings-section">
      <div class="settings-head">${t("Preferences")}</div>
      <div class="settings-row">
        <div><div class="settings-label">${t("Native Language")}</div><div class="settings-val">${esc(nativeLang.native)} &middot; ${esc(nativeLang.name)}</div></div>
        <button class="settings-btn" id="setChangeLang">${t("Change")}</button>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">${t("Site Language")}</div><div class="settings-val">${esc(siteLang.native)} &middot; ${esc(siteLang.name)}</div></div>
        <button class="settings-btn" id="setChangeSiteLang">${t("Change")}</button>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">${t("Appearance")}</div><div class="settings-val" id="setThemeVal">${document.documentElement.dataset.theme==='dark'?t('Dark mode'):t('Light mode')}</div></div>
        <button class="settings-btn" id="setThemeToggle">${t("Toggle")}</button>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">${t("Reading Level")}</div><div class="settings-val">Level ${esc(curLevel)} &mdash; ${esc(LEVEL_DESC[curLevel])}</div></div>
        <button class="settings-btn" id="setChangeLevel">${t("Change")}</button>
      </div>
      <div class="settings-row" style="flex-wrap:wrap;gap:10px">
        <div class="settings-label" style="width:100%;margin-bottom:2px">${t("Voice")}</div>
        <div class="voice-row-r" style="margin-top:0">
          <span class="vl">Accent</span>
          <div class="vs-g">
            <button class="sp${voicePref.accent==='US'?' on':''}" id="vpUS">US</button>
            <button class="sp${voicePref.accent==='GB'?' on':''}" id="vpGB">GB</button>
          </div>
          <span class="vl">Voice</span>
          <div class="vs-g">
            <button class="sp${voicePref.gender==='M'?' on':''}" id="vpM">Male</button>
            <button class="sp${voicePref.gender==='F'?' on':''}" id="vpF">Female</button>
          </div>
        </div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-head">${t("Your Progress")}</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num">${DONE.size}</div><div class="stat-label">${t("Stories Read")}</div></div>
        <div class="stat-card"><div class="stat-num">${totalSaved}</div><div class="stat-label">${t("Sentences Saved")}</div></div>
        <div class="stat-card"><div class="stat-num">${activeDays}</div><div class="stat-label">${t("Active Days")}</div></div>
        <div class="stat-card"><div class="stat-num">${avgMins}<span style="font-size:14px"> m</span></div><div class="stat-label">${t("Daily Average")}</div></div>
      </div>
      <div class="lp-wrap">
        <div class="lp-labels"><span>Level ${esc(curLevel)} ${t("progress complete")}</span><span>${doneInLv} / ${lvStories.length} stories${nextLv?` &rarr; ${esc(nextLv)}`:""}</span></div>
        <div class="lp-bar-bg"><div class="lp-bar-fill" style="width:${lvPct}%"></div></div>
        <div class="lp-caption">${lvPct}%${nextLv?` — ${t("keep reading to reach Level")} ${esc(nextLv)}`:` — ${t("level mastered!")}`}</div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">${t("Reading Time This Week (minutes / day)")}</div>
        <svg class="chart-svg" viewBox="0 0 ${W} ${H}" height="${H}">
          <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--accent)" stop-opacity=".3"/>
            <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
          </linearGradient></defs>
          <path d="${fp}" fill="url(#cg)"/>
          <path d="${cp}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${dots}
        </svg>
        <div class="chart-labels">${chartDays.map(d=>`<span>${d.label}</span>`).join("")}</div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-head">${t("Data")}</div>
      <div class="settings-row">
        <div><div class="settings-label">${t("Export Progress")}</div><div class="settings-val">${t("Download your saved sentences and reading history")}</div></div>
        <button class="settings-btn" id="setExport">${t("Export")}</button>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">${t("Import Progress")}</div><div class="settings-val">${t("Restore from a previously exported file")}</div></div>
        <button class="settings-btn" id="setImport">${t("Import")}</button>
      </div>
    </div>
  </div>`;
  $("#setChangeLang").onclick=()=>showLangModal(true);
  $("#setChangeSiteLang").onclick=()=>showSiteLangModal(true);
  $("#setChangeLevel").onclick=()=>showLevelModal(true);
  function applyVP(key,val){
    voicePref[key]=val;
    localStorage.setItem('nh-voice-pref',JSON.stringify(voicePref));
    pickVoice();
    $("#vpUS").classList.toggle('on',voicePref.accent==='US');
    $("#vpGB").classList.toggle('on',voicePref.accent==='GB');
    $("#vpM").classList.toggle('on',voicePref.gender==='M');
    $("#vpF").classList.toggle('on',voicePref.gender==='F');
  }
  $("#vpUS").onclick=()=>applyVP('accent','US');
  $("#vpGB").onclick=()=>applyVP('accent','GB');

  $("#vpF").onclick=()=>applyVP('gender','F');
  $("#setThemeToggle").onclick=()=>{

}

/* ---------- toast ---------- */
let toastT;
function toast(msg){ const el=$("#toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),1700); }

/* ---------- time tracking ---------- */
let sessionStart=Date.now();
function saveSessionTime(){
  const now=Date.now();
  const secs=Math.round((now-sessionStart)/1000);
  sessionStart=now;
  if(secs<5) return;
  const key=new Date().toISOString().slice(0,10);
  let st={}; try{ st=JSON.parse(localStorage.getItem("nh-stats")||"{}")||{}; }catch(e){}
  if(!st.days) st.days={};
  st.days[key]=(st.days[key]||0)+secs;
  try{ localStorage.setItem("nh-stats",JSON.stringify(st)); }catch(e){}
}
setInterval(saveSessionTime,60000);
document.addEventListener("visibilitychange",()=>{ if(document.hidden) saveSessionTime(); });
window.addEventListener("beforeunload",saveSessionTime);

(async function init(){
  const sv=await loadJSON("nh-saved",null);
  if(sv){ [...LEVELS,'tech'].forEach(l=>SAVED[l]=Array.isArray(sv[l])?sv[l]:[]); }
  TR=await loadJSON("nh-tr",{})||{};

  const tab=new URLSearchParams(window.location.search).get("tab");

})();
